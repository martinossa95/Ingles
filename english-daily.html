  {phrase:"shed light on",es:"arrojar luz sobre / esclarecer / aclarar",register:"formal",context:"Se usa cuando algo ayuda a entender mejor una situaci\u00f3n confusa. Muy frecuente en investigaci\u00f3n y an\u00e1lisis.",examples:[{en:"This report <em>sheds light on</em> the factors driving customer churn.",es:"Este informe arroja luz sobre los factores que impulsan la p\u00e9rdida de clientes."},{en:"The interviews <em>shed light on</em> why employees were leaving.",es:"Las entrevistas aclararon por qu\u00e9 los empleados se iban."},{en:"Could you <em>shed some light on</em> your decision-making process?",es:"\u00bfPodr\u00edas arrojar algo de luz sobre tu proceso de toma de decisiones?"}],tip:"'Shed light on' = tirar luz sobre = iluminar lo que estaba oscuro. Sujeto t\u00edpico: estudios, datos, entrevistas.",extra:"Sin\u00f3nimos formales: 'illuminate', 'clarify', 'elucidate'. Muy visual y usado en presentaciones ejecutivas."},
  {phrase:"touch base",es:"ponerse en contacto / hacer un chequeo r\u00e1pido",register:"neutro",context:"Se usa para indicar un contacto breve para actualizar o verificar el estado de algo. Muy com\u00fan en ingl\u00e9s corporativo americano.",examples:[{en:"Let's <em>touch base</em> on Friday to see where we are with the proposal.",es:"Pong\u00e1monos en contacto el viernes para ver c\u00f3mo vamos con la propuesta."},{en:"I just wanted to <em>touch base</em> before the client presentation.",es:"Solo quer\u00eda hacer un chequeo r\u00e1pido antes de la presentaci\u00f3n al cliente."},{en:"She <em>touches base</em> with her team every Monday morning.",es:"Ella hace un chequeo con su equipo cada lunes por la ma\u00f1ana."}],tip:"'Touch base' = tocar la base (del b\u00e9isbol) = hacer un contacto r\u00e1pido para confirmar que todo est\u00e1 bien.",extra:"Puede sonar clich\u00e9 en algunos contextos. Sin\u00f3nimos m\u00e1s frescos: 'check in', 'sync up', 'catch up'."},
  {phrase:"take stock of",es:"hacer un balance de / evaluar la situaci\u00f3n",register:"formal",context:"Se usa cuando alguien se detiene a reflexionar y evaluar su situaci\u00f3n actual antes de decidir el pr\u00f3ximo paso.",examples:[{en:"At the end of the year, it's good to <em>take stock of</em> what you've achieved.",es:"Al final del a\u00f1o, es bueno hacer un balance de lo que has logrado."},{en:"We need to <em>take stock of</em> our resources before committing to this project.",es:"Necesitamos evaluar nuestros recursos antes de comprometernos con este proyecto."},{en:"She <em>took stock of</em> her career and realized she wanted a change.",es:"Hizo un balance de su carrera y se dio cuenta de que quer\u00eda un cambio."}],tip:"'Take stock' = hacer inventario = contar lo que tienes antes de decidir.",extra:"Del mundo comercial: los comerciantes tomaban stock peri\u00f3dicamente. Hoy es met\u00e1fora para reflexi\u00f3n estrat\u00e9gica."},
  {phrase:"gear up",es:"prepararse / equiparse / alistarse",register:"neutro",context:"Se usa cuando alguien o una organizaci\u00f3n se prepara activamente para un evento, lanzamiento o desaf\u00edo pr\u00f3ximo.",examples:[{en:"The team is <em>gearing up</em> for the biggest product launch of the year.",es:"El equipo se est\u00e1 preparando para el lanzamiento de producto m\u00e1s importante del a\u00f1o."},{en:"We need to <em>gear up</em> our customer support before the campaign goes live.",es:"Necesitamos reforzar nuestro soporte al cliente antes de que la campa\u00f1a salga al aire."},{en:"She's been <em>gearing up</em> for this presentation for three weeks.",es:"Lleva tres semanas prepar\u00e1ndose para esta presentaci\u00f3n."}],tip:"'Gear up' = poner el engranaje en marcha = preparar toda la maquinaria para lo que viene.",extra:"'Gear up for' siempre implica preparaci\u00f3n activa y anticipatoria. M\u00e1s energ\u00e9tico que simplemente 'prepare for'."},
  {phrase:"pave the way for",es:"allanar el camino para / preparar el terreno",register:"formal",context:"Se usa cuando algo crea las condiciones necesarias para que ocurra algo m\u00e1s en el futuro.",examples:[{en:"This pilot program will <em>pave the way for</em> a nationwide rollout.",es:"Este programa piloto allanar\u00e1 el camino para una implementaci\u00f3n nacional."},{en:"Her research <em>paved the way for</em> the development of the new vaccine.",es:"Su investigaci\u00f3n prepar\u00f3 el terreno para el desarrollo de la nueva vacuna."},{en:"The agreement <em>paves the way for</em> closer economic cooperation.",es:"El acuerdo abre el camino para una cooperaci\u00f3n econ\u00f3mica m\u00e1s estrecha."}],tip:"'Pave the way' = pavimentar el camino = hacer que el tr\u00e1nsito futuro sea m\u00e1s f\u00e1cil.",extra:"Muy com\u00fan en discursos, informes y titulares. Sujeto t\u00edpico: acuerdos, estudios, legislaci\u00f3n, eventos hist\u00f3ricos."},
  {phrase:"factor in",es:"tener en cuenta / incluir en el c\u00e1lculo",register:"neutro",context:"Se usa cuando se incluye un elemento adicional en un an\u00e1lisis, plan o c\u00e1lculo. Muy com\u00fan en planificaci\u00f3n y toma de decisiones.",examples:[{en:"Did you <em>factor in</em> the shipping costs when calculating the budget?",es:"\u00bfTuviste en cuenta los costos de env\u00edo al calcular el presupuesto?"},{en:"We need to <em>factor in</em> the time difference when scheduling the call.",es:"Necesitamos tener en cuenta la diferencia horaria al programar la llamada."},{en:"Please <em>factor in</em> potential delays when setting the timeline.",es:"Por favor incluye posibles retrasos al fijar el cronograma."}],tip:"'Factor in' = incluir como factor = agregar una variable al c\u00e1lculo o plan.",extra:"'Factor out' = lo opuesto: excluir algo del c\u00e1lculo. 'Factor in the risk' = considerar el riesgo."},
  {phrase:"phase out",es:"eliminar gradualmente / descontinuar",register:"formal",context:"Se usa cuando algo se elimina de forma progresiva y planificada, no de golpe. Muy com\u00fan en pol\u00edtica empresarial y tecnolog\u00eda.",examples:[{en:"The company plans to <em>phase out</em> plastic packaging by 2026.",es:"La empresa planea eliminar gradualmente el embalaje pl\u00e1stico para 2026."},{en:"That software is being <em>phased out</em> \u2014 migrate before December.",es:"Ese software est\u00e1 siendo descontinuado \u2014 migra antes de diciembre."},{en:"The government is <em>phasing out</em> fossil fuel subsidies over five years.",es:"El gobierno est\u00e1 eliminando gradualmente los subsidios a los combustibles f\u00f3siles en cinco a\u00f1os."}],tip:"'Phase out' = eliminar por fases. Lo opuesto: 'phase in' = introducir progresivamente.",extra:"'Phase-out plan' = plan de descontinuaci\u00f3n. Muy com\u00fan en documentos de sostenibilidad y tecnolog\u00eda."},
  {phrase:"liaise with",es:"coordinarse con / enlazarse con",register:"formal",context:"Se usa en contextos profesionales para indicar coordinaci\u00f3n estrecha con otro departamento, equipo o persona.",examples:[{en:"You'll need to <em>liaise with</em> the legal team before sending that email.",es:"Necesitar\u00e1s coordinarte con el equipo legal antes de enviar ese correo."},{en:"She <em>liaises with</em> clients on a daily basis as part of her role.",es:"Ella se coordina con los clientes a diario como parte de su rol."},{en:"Our team <em>liaises closely with</em> the regional offices to align strategy.",es:"Nuestro equipo se coordina estrechamente con las oficinas regionales para alinear la estrategia."}],tip:"'Liaise' (del franc\u00e9s) = actuar como enlace. 'Liaise with' = coordinarse con. M\u00e1s formal que 'work with'.",extra:"Muy usado en Reino Unido y contextos corporativos internacionales. En ingl\u00e9s americano, 'coordinate with' es m\u00e1s natural."},
  {phrase:"head up",es:"liderar / estar al frente de",register:"neutro",context:"Se usa para indicar que alguien est\u00e1 a cargo o dirige un equipo o proyecto. M\u00e1s din\u00e1mico que 'lead' o 'manage'.",examples:[{en:"She was asked to <em>head up</em> the new digital transformation initiative.",es:"Le pidieron que liderara la nueva iniciativa de transformaci\u00f3n digital."},{en:"Who's going to <em>head up</em> the team while the director is away?",es:"\u00bfQui\u00e9n va a estar al frente del equipo mientras el director est\u00e1 fuera?"},{en:"He's been <em>heading up</em> the research division for three years.",es:"Ha estado liderando la divisi\u00f3n de investigaci\u00f3n durante tres a\u00f1os."}],tip:"'Head up' = estar en la cabeza de = liderar desde el frente. M\u00e1s din\u00e1mico que 'manage' o 'run'.",extra:"'Head up' implica un rol activo de liderazgo, no solo un t\u00edtulo."},
  {phrase:"go back on",es:"incumplir / retractarse de una promesa",register:"neutro",context:"Se usa cuando alguien no cumple con lo que prometi\u00f3 o acord\u00f3. Tiene connotaci\u00f3n negativa de falta de integridad.",examples:[{en:"He <em>went back on</em> his word \u2014 he promised a raise and never delivered.",es:"Incumpli\u00f3 su palabra \u2014 prometi\u00f3 un aumento y nunca lo dio."},{en:"The company <em>went back on</em> the agreement they signed last year.",es:"La empresa incumpli\u00f3 el acuerdo que firmaron el a\u00f1o pasado."},{en:"Don't <em>go back on</em> your commitment \u2014 they're counting on you.",es:"No te retractes de tu compromiso \u2014 est\u00e1n contando contigo."}],tip:"'Go back on' = volver hacia atr\u00e1s sobre lo dicho = deshacer un compromiso. Siempre negativo.",extra:"'Go back on your word' = faltar a la palabra. En negocios es muy grave \u2014 implica p\u00e9rdida de confianza."},
  {phrase:"live up to",es:"estar a la altura de / cumplir con expectativas",register:"neutro",context:"Se usa para evaluar si algo o alguien cumpli\u00f3 con las expectativas o est\u00e1ndares previos.",examples:[{en:"The product didn't quite <em>live up to</em> the hype \u2014 users were disappointed.",es:"El producto no estuvo del todo a la altura del hype \u2014 los usuarios quedaron decepcionados."},{en:"She really <em>lived up to</em> her reputation as a brilliant negotiator.",es:"Realmente estuvo a la altura de su reputaci\u00f3n como brillante negociadora."},{en:"It's hard to <em>live up to</em> your first successful product.",es:"Es dif\u00edcil estar a la altura de tu primer producto exitoso."}],tip:"'Live up to' = vivir a la altura de = alcanzar el nivel que se esperaba.",extra:"'Live up to your potential' = alcanzar tu potencial. Muy usado en evaluaciones de desempe\u00f1o y cr\u00edticas de productos."},
  {phrase:"tap into",es:"aprovechar / acceder a / explotar un recurso",register:"neutro",context:"Se usa cuando alguien accede o aprovecha un recurso, talento o sentimiento que exist\u00eda pero no se estaba usando.",examples:[{en:"The campaign really <em>taps into</em> people's nostalgia for the 90s.",es:"La campa\u00f1a realmente aprovecha la nostalgia de la gente por los 90."},{en:"We need to <em>tap into</em> the youth market more effectively.",es:"Necesitamos acceder al mercado joven de forma m\u00e1s efectiva."},{en:"She has a unique ability to <em>tap into</em> her team's strengths.",es:"Ella tiene una habilidad \u00fanica para aprovechar las fortalezas de su equipo."}],tip:"'Tap into' = abrir el grifo hacia algo = acceder a un recurso latente o no explotado.",extra:"'Tap into emotions' = conectar con las emociones de alguien. Muy usado en marketing y liderazgo."},
  {phrase:"cut corners",es:"atajar / hacer las cosas a medias",register:"informal",context:"Se usa cuando alguien omite pasos importantes para ahorrar tiempo o dinero, generalmente con consecuencias negativas.",examples:[{en:"We can't afford to <em>cut corners</em> on safety \u2014 it's non-negotiable.",es:"No podemos permitirnos saltarnos pasos en seguridad \u2014 no es negociable."},{en:"The contractor <em>cut corners</em> on the materials and now there are structural problems.",es:"El contratista us\u00f3 materiales de baja calidad y ahora hay problemas estructurales."},{en:"If you <em>cut corners</em> now, you'll pay for it later.",es:"Si haces las cosas a medias ahora, lo pagar\u00e1s despu\u00e9s."}],tip:"'Cut corners' = cortar las esquinas = tomar el camino m\u00e1s corto sacrificando calidad. Siempre negativo.",extra:"La met\u00e1fora viene de la carpinter\u00eda: cortar las esquinas del trabajo fino para terminarlo m\u00e1s r\u00e1pido."},
  {phrase:"bear with",es:"tener paciencia / aguantar un momento",register:"formal",context:"Se usa para pedir paciencia a alguien mientras se resuelve algo. M\u00e1s formal y educado que 'hold on'.",examples:[{en:"<em>Bear with</em> me for just a moment \u2014 I'm pulling up the file.",es:"Ten paciencia un momento \u2014 estoy abriendo el archivo."},{en:"<em>Bear with</em> us while we resolve this technical issue.",es:"Tengan paciencia con nosotros mientras resolvemos este problema t\u00e9cnico."},{en:"I know this section is complex \u2014 please <em>bear with</em> me.",es:"S\u00e9 que esta secci\u00f3n es compleja \u2014 por favor tengan paciencia conmigo."}],tip:"'Bear with' = cargar con (la espera) = aguantar pacientemente. M\u00e1s formal que 'hold on'.",extra:"'Bear with me' es la forma m\u00e1s educada de pedir paciencia en ingl\u00e9s profesional. Evita el m\u00e1s brusco 'wait'."},
  {phrase:"ride out",es:"aguantar / superar / sobrevivir una crisis",register:"neutro",context:"Se usa para describir c\u00f3mo alguien o algo sobrevive o atraviesa un per\u00edodo dif\u00edcil sin sucumbir.",examples:[{en:"The company managed to <em>ride out</em> the recession without layoffs.",es:"La empresa logr\u00f3 superar la recesi\u00f3n sin despidos."},{en:"We just need to <em>ride out</em> this slow period \u2014 it won't last forever.",es:"Solo necesitamos aguantar este per\u00edodo lento \u2014 no durar\u00e1 para siempre."},{en:"She's <em>ridden out</em> tougher storms than this in her career.",es:"Ella ha sobrevivido tormentas m\u00e1s dif\u00edciles que esta en su carrera."}],tip:"'Ride out' = montar la ola sin caer = aguantar hasta que pase la tormenta.",extra:"Met\u00e1fora marina: los barcos 'ride out' las tormentas anclados. En los negocios: resistir una crisis sin rendirse."},
  {phrase:"hold off",es:"esperar / postergar / aguantar antes de actuar",register:"neutro",context:"Se usa cuando alguien decide no actuar todav\u00eda, esperando mejores condiciones o m\u00e1s informaci\u00f3n.",examples:[{en:"Let's <em>hold off</em> on signing until we get the legal team's review.",es:"Esperemos para firmar hasta que tengamos la revisi\u00f3n del equipo legal."},{en:"She <em>held off</em> on announcing the news until all the details were confirmed.",es:"Esper\u00f3 para anunciar la noticia hasta que todos los detalles fueron confirmados."},{en:"Can we <em>hold off</em> on this decision until next week?",es:"\u00bfPodemos postergar esta decisi\u00f3n hasta la pr\u00f3xima semana?"}],tip:"'Hold off' = aguantar = retrasar la acci\u00f3n deliberadamente hasta tener las condiciones correctas.",extra:"Diferente de 'put off' (posponer sin fecha clara). 'Hold off' implica una espera activa con intenci\u00f3n de actuar pronto."},
  {phrase:"move on",es:"seguir adelante / pasar al siguiente punto / superar",register:"neutro",context:"Para indicar que es momento de avanzar, ya sea en una conversaci\u00f3n o emocionalmente (superar algo dif\u00edcil).",examples:[{en:"Let's <em>move on</em> to the next item on the agenda.",es:"Pasemos al siguiente punto de la agenda."},{en:"It's been six months \u2014 it's time to <em>move on</em> and not dwell on the failure.",es:"Han sido seis meses \u2014 es tiempo de seguir adelante y no quedarse en el fracaso."},{en:"The company has <em>moved on</em> from that strategy and is focusing on digital.",es:"La empresa ha dejado atr\u00e1s esa estrategia y se est\u00e1 enfocando en lo digital."}],tip:"'Move on' = moverse hacia adelante = no quedarse estancado. Para reuniones y para la vida.",extra:"'Time to move on' es muy usada en liderazgo para indicar cierre de un tema sin m\u00e1s debate."},
  {phrase:"press ahead",es:"seguir adelante / avanzar con determinaci\u00f3n",register:"formal",context:"Se usa cuando alguien decide continuar con un plan a pesar de obst\u00e1culos, dudas o resistencia.",examples:[{en:"Despite the budget cuts, the team decided to <em>press ahead</em> with the project.",es:"A pesar de los recortes presupuestarios, el equipo decidi\u00f3 seguir adelante con el proyecto."},{en:"The government plans to <em>press ahead</em> with the infrastructure reforms.",es:"El gobierno planea avanzar con las reformas de infraestructura."},{en:"We've come too far to stop now \u2014 let's <em>press ahead</em>.",es:"Hemos llegado demasiado lejos para detenernos ahora \u2014 sigamos adelante."}],tip:"'Press ahead' = presionar hacia adelante = avanzar con fuerza a pesar de la resistencia.",extra:"M\u00e1s com\u00fan en ingl\u00e9s brit\u00e1nico y contextos pol\u00edticos. En ingl\u00e9s americano, 'push forward' o 'move ahead' son m\u00e1s naturales."},
  {phrase:"zoom in on",es:"ampliar / enfocarse en detalle",register:"neutro",context:"Met\u00e1fora fotogr\u00e1fica: acercar la lente para ver algo con m\u00e1s detalle. Muy usado en an\u00e1lisis y presentaciones.",examples:[{en:"Let's <em>zoom in on</em> the Q3 numbers \u2014 there's something interesting there.",es:"Acerquemos el zoom a los n\u00fameros del tercer trimestre \u2014 hay algo interesante ah\u00ed."},{en:"The report <em>zooms in on</em> three specific markets.",es:"El informe se enfoca en detalle en tres mercados espec\u00edficos."},{en:"I'd like to <em>zoom in on</em> one particular aspect of your proposal.",es:"Me gustar\u00eda enfocarme en detalle en un aspecto particular de tu propuesta."}],tip:"'Zoom in on' = acercar la c\u00e1mara = examinar algo con mayor nivel de detalle.",extra:"Par complementario: 'zoom out' = alejarse para ver el panorama general. 'Let's zoom out and look at the big picture.'"},
  {phrase:"single out",es:"destacar / seleccionar / se\u00f1alar a alguien espec\u00edficamente",register:"neutro",context:"Se usa cuando se elige o se\u00f1ala a una persona de entre un grupo, ya sea para elogiarla o criticarla.",examples:[{en:"The manager <em>singled out</em> her work as the best of the quarter.",es:"La gerente destac\u00f3 su trabajo como el mejor del trimestre."},{en:"I don't want to <em>single anyone out</em> \u2014 this is a team issue.",es:"No quiero se\u00f1alar a nadie en particular \u2014 este es un problema de equipo."},{en:"Which candidate would you <em>single out</em> as the top choice?",es:"\u00bfA qu\u00e9 candidato destacar\u00edas como la primera opci\u00f3n?"}],tip:"'Single out' = sacar a uno del grupo = identificar y separar a alguien del resto.",extra:"Puede ser positivo (reconocer) o negativo (se\u00f1alar injustamente). El contexto y el tono lo determinan."},
  {phrase:"get bogged down",es:"atascarse / quedarse empantanado en los detalles",register:"neutro",context:"Se usa cuando alguien pierde velocidad por exceso de detalles, burocracia o problemas menores.",examples:[{en:"Don't <em>get bogged down</em> in the details \u2014 focus on the big picture.",es:"No te quedes empantanado en los detalles \u2014 enf\u00f3cate en el panorama general."},{en:"The project <em>got bogged down</em> in approval processes and missed the deadline.",es:"El proyecto se atasc\u00f3 en procesos de aprobaci\u00f3n y perdi\u00f3 el plazo."},{en:"We <em>got bogged down</em> in a long debate about the color scheme.",es:"Nos quedamos atascados en un largo debate sobre la paleta de colores."}],tip:"'Get bogged down' = hundirse en el barro = perder velocidad por exceso de obst\u00e1culos menores.",extra:"Met\u00e1fora del terreno pantanoso. En proyectos y reuniones: se\u00f1al de que hay que cambiar el enfoque."},
  {phrase:"stand by",es:"estar listo / apoyar / mantenerse en espera",register:"neutro",context:"Tres usos: (1) estar preparado para actuar, (2) apoyar a alguien en un momento dif\u00edcil, (3) esperar en comunicaciones.",examples:[{en:"Please <em>stand by</em> \u2014 we're about to begin the broadcast.",es:"Por favor esperen \u2014 estamos a punto de comenzar la transmisi\u00f3n."},{en:"She <em>stood by</em> her colleague when everyone else turned against him.",es:"Ella apoy\u00f3 a su colega cuando todos los dem\u00e1s se volvieron en su contra."},{en:"The technical team is <em>standing by</em> in case there are issues during the launch.",es:"El equipo t\u00e9cnico est\u00e1 en espera por si hay problemas durante el lanzamiento."}],tip:"'Stand by' = permanecer de pie al lado = estar disponible y listo. Implica preparaci\u00f3n y lealtad.",extra:"'Standby' como sustantivo: 'a standby generator' = generador de emergencia. 'On standby' = en modo de espera."},
  {phrase:"clear up",es:"aclarar / resolver / despejarse",register:"neutro",context:"Tres usos: (1) aclarar un malentendido, (2) resolver un problema, (3) el clima despeja.",examples:[{en:"Let me <em>clear up</em> any confusion about the new policy.",es:"D\u00e9jame aclarar cualquier confusi\u00f3n sobre la nueva pol\u00edtica."},{en:"Has the situation <em>cleared up</em> since the last update?",es:"\u00bfLa situaci\u00f3n se ha resuelto desde la \u00faltima actualizaci\u00f3n?"},{en:"The weather should <em>clear up</em> by afternoon \u2014 the forecast looks better.",es:"El clima deber\u00eda despejarse para la tarde \u2014 el pron\u00f3stico se ve mejor."}],tip:"'Clear up' = despejar hacia arriba = eliminar la confusi\u00f3n, los problemas o las nubes.",extra:"'Clear something up' = aclarar algo espec\u00edfico: 'I need to clear something up \u2014 there's been a misunderstanding.'"},
  {phrase:"give way to",es:"ceder el paso a / dar paso a / ser reemplazado por",register:"formal",context:"Se usa cuando algo cede ante otra cosa o es reemplazado por algo nuevo.",examples:[{en:"Traditional retail is <em>giving way to</em> e-commerce across all categories.",es:"El retail tradicional est\u00e1 dando paso al e-commerce en todas las categor\u00edas."},{en:"Her initial resistance <em>gave way to</em> genuine enthusiasm for the project.",es:"Su resistencia inicial cedi\u00f3 ante un entusiasmo genuino por el proyecto."},{en:"Please <em>give way</em> to pedestrians at the crossing.",es:"Por favor cede el paso a los peatones en el cruce."}],tip:"'Give way to' = abrir el camino para otro = ser reemplazado o ceder ante algo m\u00e1s fuerte.",extra:"Muy usado en an\u00e1lisis de tendencias: 'X is giving way to Y' = X est\u00e1 siendo sustituido por Y."},
  {phrase:"come into play",es:"entrar en juego / comenzar a tener relevancia",register:"formal",context:"Se usa cuando un factor, regla o elemento empieza a ser relevante o a influir en una situaci\u00f3n.",examples:[{en:"Several factors <em>came into play</em> during the acquisition process.",es:"Varios factores entraron en juego durante el proceso de adquisici\u00f3n."},{en:"This is where your negotiation skills really <em>come into play</em>.",es:"Aqu\u00ed es donde tus habilidades de negociaci\u00f3n realmente entran en juego."},{en:"Tax regulations <em>come into play</em> when you cross that revenue threshold.",es:"Las regulaciones fiscales entran en juego cuando superas ese umbral de ingresos."}],tip:"'Come into play' = entrar al campo de juego = volverse relevante o activo.",extra:"Sin\u00f3nimos: 'come into effect', 'become relevant', 'kick in'. 'Come into play' tiene el matiz de que algo que estaba esperando ahora es relevante."},
  {phrase:"pin down",es:"concretar / precisar / identificar con exactitud",register:"neutro",context:"Se usa cuando alguien trata de fijar algo que es vago: una fecha, una idea, una causa o una persona dif\u00edcil de comprometer.",examples:[{en:"We've been trying to <em>pin down</em> the exact launch date for weeks.",es:"Llevamos semanas intentando concretar la fecha exacta de lanzamiento."},{en:"It's hard to <em>pin down</em> what's causing the drop in engagement.",es:"Es dif\u00edcil identificar exactamente qu\u00e9 est\u00e1 causando la ca\u00edda en el engagement."},{en:"The client is impossible to <em>pin down</em> \u2014 she cancels every call.",es:"La cliente es imposible de comprometer \u2014 cancela cada llamada."}],tip:"'Pin down' = clavar en un punto fijo = precisar algo que se mueve o es vago.",extra:"'Pin someone down' = lograr que alguien se comprometa con una respuesta o fecha concreta."},
  {phrase:"flag up",es:"se\u00f1alar / advertir / llamar la atenci\u00f3n sobre",register:"formal",context:"Se usa para indicar que algo requiere atenci\u00f3n especial o es un riesgo. Muy com\u00fan en auditor\u00edas y evaluaciones de riesgo.",examples:[{en:"The auditor <em>flagged up</em> several discrepancies in the accounts.",es:"El auditor se\u00f1al\u00f3 varias discrepancias en las cuentas."},{en:"I wanted to <em>flag up</em> a potential issue before it becomes a problem.",es:"Quer\u00eda advertir sobre un problema potencial antes de que se convierta en uno."},{en:"These concerns were <em>flagged up</em> in the risk assessment report.",es:"Estas preocupaciones fueron se\u00f1aladas en el informe de evaluaci\u00f3n de riesgos."}],tip:"'Flag up' = levantar una bandera = marcar algo para que sea visible. M\u00e1s urgente que 'mention'.",extra:"En ingl\u00e9s americano se dice simplemente 'flag' (sin 'up'): 'I wanted to flag this for your attention.' Ambas versiones son v\u00e1lidas."},
  {phrase:"ease into",es:"entrar gradualmente / adaptarse poco a poco",register:"neutro",context:"Se usa para describir una transici\u00f3n suave y progresiva hacia algo nuevo. Implica no forzar el cambio.",examples:[{en:"Let's <em>ease into</em> the new workflow \u2014 no need to change everything at once.",es:"Entremos gradualmente al nuevo flujo de trabajo \u2014 no hay necesidad de cambiar todo a la vez."},{en:"She <em>eased into</em> the leadership role over her first three months.",es:"Se fue adaptando al rol de liderazgo durante sus primeros tres meses."},{en:"After surgery, he had to <em>ease into</em> exercise very slowly.",es:"Despu\u00e9s de la cirug\u00eda, tuvo que retomar el ejercicio muy gradualmente."}],tip:"'Ease into' = deslizarse suavemente hacia algo. Lo opuesto: 'jump into' (entrar de golpe).",extra:"'Ease someone into something' = ayudar a alguien a adaptarse gradualmente. Muy usado en onboarding y gesti\u00f3n del cambio."},
  {phrase:"stand in for",es:"reemplazar temporalmente / cubrir a alguien",register:"neutro",context:"Se usa cuando alguien cubre temporalmente el rol de otra persona que no est\u00e1 disponible.",examples:[{en:"Can you <em>stand in for</em> me at the Monday meeting? I'll be traveling.",es:"\u00bfPuedes cubrirme en la reuni\u00f3n del lunes? Estar\u00e9 viajando."},{en:"She <em>stood in for</em> the CEO during his medical leave.",es:"Ella cubri\u00f3 al CEO durante su licencia m\u00e9dica."},{en:"He often <em>stands in for</em> the department head when she's unavailable.",es:"\u00c9l frecuentemente cubre a la jefa del departamento cuando no est\u00e1 disponible."}],tip:"'Stand in for' = ponerse en el lugar de = sustituir temporalmente. Diferente de 'take over' (m\u00e1s permanente).",extra:"'Stand-in' como sustantivo: un sustituto temporal. En cine, ocupa el lugar del actor durante el rodaje t\u00e9cnico."},
  {phrase:"filter out",es:"filtrar / eliminar / descartar",register:"neutro",context:"Se usa cuando se eliminan elementos no deseados de un conjunto. Aplica para datos, candidatos o informaci\u00f3n irrelevante.",examples:[{en:"The algorithm <em>filters out</em> spam before it reaches your inbox.",es:"El algoritmo filtra el spam antes de que llegue a tu bandeja de entrada."},{en:"We need to <em>filter out</em> the candidates who don't meet the basic requirements.",es:"Necesitamos descartar a los candidatos que no cumplen los requisitos b\u00e1sicos."},{en:"I use noise-canceling headphones to <em>filter out</em> distractions.",es:"Uso aud\u00edfonos con cancelaci\u00f3n de ruido para filtrar las distracciones."}],tip:"'Filter out' = pasar por el filtro y sacar = eliminar lo no deseado.",extra:"'Filter in' = lo opuesto: incluir selectivamente. En an\u00e1lisis de datos: 'filter out outliers' = eliminar valores at\u00edpicos."},
  {phrase:"chalk up",es:"atribuir / acumular / anotar un logro",register:"informal",context:"Se usa para registrar o atribuir un logro o resultado. Tambi\u00e9n para explicar la causa de algo con actitud positiva.",examples:[{en:"We can <em>chalk up</em> this quarter's success to better targeting.",es:"Podemos atribuir el \u00e9xito de este trimestre a una mejor segmentaci\u00f3n."},{en:"She's <em>chalked up</em> three promotions in four years \u2014 impressive.",es:"Ha acumulado tres ascensos en cuatro a\u00f1os \u2014 impresionante."},{en:"Let's just <em>chalk it up to</em> experience and move forward.",es:"Simplemente atribuy\u00e1moslo a la experiencia y avancemos."}],tip:"'Chalk up' = anotar con tiza en el pizarr\u00f3n = registrar un resultado o \u00e9xito.",extra:"'Chalk it up to experience' es muy \u00fatil para aceptar un fracaso con actitud positiva. Muy usada en ingl\u00e9s coloquial."},
  {phrase:"knuckle down",es:"ponerse a trabajar en serio / aplicarse con determinaci\u00f3n",register:"informal",context:"Se usa cuando alguien necesita concentrarse y trabajar duro, especialmente despu\u00e9s de haber perdido tiempo.",examples:[{en:"The exams are next week \u2014 it's time to <em>knuckle down</em>.",es:"Los ex\u00e1menes son la pr\u00f3xima semana \u2014 es hora de ponerse a trabajar en serio."},{en:"We need to <em>knuckle down</em> and finish this by Friday.",es:"Necesitamos aplicarnos y terminarlo antes del viernes."},{en:"After months of delays, the team finally <em>knuckled down</em> and delivered.",es:"Despu\u00e9s de meses de retrasos, el equipo finalmente se puso serio y entreg\u00f3."}],tip:"'Knuckle down' = poner los nudillos sobre la mesa = concentrarse y trabajar con determinaci\u00f3n.",extra:"Originado del juego de canicas. Hoy implica esfuerzo serio y disciplinado."},
  {phrase:"phase in",es:"introducir gradualmente / implementar por etapas",register:"formal",context:"Se usa cuando algo nuevo se introduce de forma progresiva y planificada, no de golpe. Lo opuesto de 'phase out'.",examples:[{en:"The new regulations will be <em>phased in</em> over the next three years.",es:"Las nuevas regulaciones se introducir\u00e1n gradualmente durante los pr\u00f3ximos tres a\u00f1os."},{en:"They're planning to <em>phase in</em> the new billing system starting in January.",es:"Planean implementar el nuevo sistema de facturaci\u00f3n progresivamente desde enero."},{en:"Remote work policies were <em>phased in</em> after the pandemic.",es:"Las pol\u00edticas de trabajo remoto se introdujeron gradualmente despu\u00e9s de la pandemia."}],tip:"'Phase in' = entrar por fases = introducir progresivamente. Par perfecto con 'phase out'.",extra:"'Phase in / phase out' es un par complementario muy \u00fatil en documentos de pol\u00edtica corporativa y tecnolog\u00eda."},
  {phrase:"ink a deal",es:"cerrar un trato / firmar un acuerdo",register:"formal",context:"Se usa en contextos de negocios para indicar que un acuerdo ha sido firmado y formalizado. 'Ink' se usa como verbo (firmar con tinta).",examples:[{en:"The two companies finally <em>inked a deal</em> after months of negotiation.",es:"Las dos empresas finalmente cerraron un trato despu\u00e9s de meses de negociaci\u00f3n."},{en:"We're hoping to <em>ink a deal</em> with the distributor before the end of Q2.",es:"Esperamos cerrar un acuerdo con el distribuidor antes de fin del segundo trimestre."},{en:"The sponsorship agreement was <em>inked</em> just hours before the event.",es:"El acuerdo de patrocinio fue firmado pocas horas antes del evento."}],tip:"'Ink a deal' = firmar con tinta = formalizar un acuerdo. M\u00e1s v\u00edvido que 'sign a deal'.",extra:"Muy com\u00fan en titulares de negocios y noticias de M&A. Tambi\u00e9n: 'seal the deal' = cerrar el trato."}
];

// ── STORAGE HELPERS (localStorage con fallback a objeto en memoria) ──────────
const _mem={};
const store={
  get(k){try{return localStorage.getItem(k)}catch(e){return _mem[k]||null}},
  set(k,v){try{localStorage.setItem(k,v)}catch(e){_mem[k]=v}},
};

// ── SMART DAILY SYSTEM ───────────────────────────────────────────────────────
const KEY_TODAY_DATE='ed_today_date';
const KEY_TODAY_IDX='ed_today_idx';
const KEY_SEEN='ed_seen';
const KEY_QUEUE='ed_queue';

function getState(){
  const savedDate=store.get(KEY_TODAY_DATE);
  const savedIdx=store.get(KEY_TODAY_IDX);
  let seen=JSON.parse(store.get(KEY_SEEN)||'[]');
  let queue=JSON.parse(store.get(KEY_QUEUE)||'[]');

  if(savedDate===todayStr && savedIdx!==null){
    return {idx:parseInt(savedIdx,10),seen,queue};
  }

  if(queue.length===0){
    const remaining=[];
    for(let i=0;i<phrasalData.length;i++){
      if(!seen.includes(i)) remaining.push(i);
    }
    if(remaining.length===0){
      seen=[];
      for(let i=0;i<phrasalData.length;i++) remaining.push(i);
    }
    for(let i=remaining.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [remaining[i],remaining[j]]=[remaining[j],remaining[i]];
    }
    queue=remaining;
  }

  const idx=queue.shift();
  seen.push(idx);
  store.set(KEY_TODAY_DATE,todayStr);
  store.set(KEY_TODAY_IDX,String(idx));
  store.set(KEY_SEEN,JSON.stringify(seen));
  store.set(KEY_QUEUE,JSON.stringify(queue));
  return {idx,seen,queue};
}

const state=getState();
const todayIdx=state.idx;
const seenList=state.seen;
const seenCount=seenList.length;
const totalCount=phrasalData.length;
const progressPct=Math.round((seenCount/totalCount)*100);

function resetProgress(){
  if(!confirm('¿Seguro que quieres reiniciar tu progreso? Comenzarás de nuevo desde cero.')) return;
  store.set(KEY_SEEN,'[]');
  store.set(KEY_QUEUE,'[]');
  store.set(KEY_TODAY_DATE,'');
  store.set(KEY_TODAY_IDX,'');
  location.reload();
}

         desc:'Hipótesis sobre algo que NO ocurrió en el pasado. Arrepentimiento, crítica o especulación sobre el pasado.',
         examples:[
           {en:'If I had known about the meeting, I would have prepared a presentation.',es:'Si hubiera sabido de la reunión, habría preparado una presentación.'},
           {en:'If we had started earlier, we could have avoided the delays.',es:'Si hubiéramos empezado antes, podríamos haber evitado los retrasos.'},
           {en:'If she had asked for feedback, she should have received it sooner.',es:'Si hubiera pedido retroalimentación, debería haberla recibido antes.'}
         ]
       },
       {
         title:'Tipo mixto — Pasado → presente (efecto que persiste)',
         formula:'If + had + past participle → would + base verb (now)',
         desc:'La causa fue en el pasado, pero la consecuencia afecta el presente.',
         examples:[
           {en:'If I had studied medicine, I would be a doctor now.',es:'Si hubiera estudiado medicina, sería médico ahora.'},
           {en:'If they had invested in that startup, they would be millionaires today.',es:'Si hubieran invertido en esa startup, serían millonarios hoy.'},
           {en:'If she hadn\'t quit that job, she would still be working there.',es:'Si no hubiera renunciado a ese trabajo, todavía estaría trabajando allí.'}
         ]
       }
     ],
     errors:[
       '"If I would have known" → ERROR grave y muy común. La cláusula con "if" usa "had + past participle", NUNCA "would have".',
       '"If she would be here" → ERROR. Tipo 2: usa Past Simple en la cláusula "if": "If she were here".',
       'Mezclar tipos: "If I had more time, I will travel" → elige un tipo y mantén la coherencia de tiempos.',
       'Olvidar "were" para todos los sujetos en tipo 2: "If I was you" (informal) → "If I were you" (correcto formal).'
     ],
     anchor:'En español los condicionales se manejan de forma muy similar: "Si hubiera sabido..." / "habría ido...". La trampa es el tipo 3 en inglés: la gente traduce mal "would have" y lo pone en la cláusula "if", lo cual es un error clásico.'
   }
  }
];

let currentTense=0;

function renderTenseNav(){
  const nav=document.getElementById('tense-nav');
  nav.innerHTML=tenseData.map((t,i)=>`
    <button class="tense-nav-btn${i===currentTense?' active':''}" onclick="selectTense(${i})">${t.name}</button>
  `).join('');
}

function selectTense(i){
  currentTense=i;
  renderTenseNav();
  renderTenseCard();
}


// ── PHRASAL VERB DEL DÍA EN TIEMPOS VERBALES ────────────────────────────────
// Genera ejemplos dinámicos usando el phrasal verb del día como hilo conductor.
// Cada tiempo usa el mismo contexto (trabajo/carrera) pero conjugado correctamente.
function getTenseExamplesForPhrsal(pv){
  // pv = phrasalData[todayIdx]
  // We build one coherent scenario around the phrasal verb, conjugated per tense.
  // The "character" is always "she/her" for consistency.
  const p = pv.phrase; // e.g. "give up"
  const esPhrase = pv.es.split('/')[0].trim(); // e.g. "rendirse"

  // Build tense-specific rows using a shared scenario
  // Each tense gets: afirmativa, negativa, pregunta
  const scenarios = {
    'Present Simple': [
      {tipo:'Afirmativa', en:`She <em>${p}s</em> when the pressure gets too high.`, es:`Se rinde cuando la presión es demasiado alta.`},
      {tipo:'Negativa',   en:`She doesn't <em>${p}</em> easily — she's very persistent.`, es:`No se rinde fácilmente — es muy persistente.`},
      {tipo:'Pregunta',   en:`Does she <em>${p}</em> under pressure?`, es:`¿Se rinde bajo presión?`}
    ],
    'Present Continuous': [
      {tipo:'Afirmativa', en:`She is <em>${p}ing</em> on the project after the last setback.`, es:`Está ${esPhrase} en el proyecto tras el último revés.`},
      {tipo:'Negativa',   en:`She isn't <em>${p}ing</em> yet — she's still trying.`, es:`Aún no está ${esPhrase} — todavía lo está intentando.`},
      {tipo:'Pregunta',   en:`Is she <em>${p}ing</em> on this idea?`, es:`¿Está ${esPhrase} con esta idea?`}
    ],
    'Present Perfect': [
      {tipo:'Afirmativa', en:`She has <em>${p}ped</em> on that approach and found a better one.`, es:`Ha ${esPhrase} en ese enfoque y encontró uno mejor.`},
      {tipo:'Negativa',   en:`She hasn't <em>${p}ped</em> yet — she's still in the game.`, es:`Todavía no ha ${esPhrase} — sigue en el juego.`},
      {tipo:'Pregunta',   en:`Has she ever <em>${p}ped</em> on a project halfway through?`, es:`¿Alguna vez ha ${esPhrase} en un proyecto a mitad de camino?`}
    ],
    'Past Simple': [
      {tipo:'Afirmativa', en:`She <em>${p}ped</em> on the deal after the meeting last Friday.`, es:`${esPhrase.charAt(0).toUpperCase()+esPhrase.slice(1)} el trato después de la reunión el viernes pasado.`},
      {tipo:'Negativa',   en:`She didn't <em>${p}</em> even when things got tough.`, es:`No ${esPhrase} incluso cuando las cosas se pusieron difíciles.`},
      {tipo:'Pregunta',   en:`Did she <em>${p}</em> before the deadline?`, es:`¿${esPhrase.charAt(0).toUpperCase()+esPhrase.slice(1)} antes del plazo?`}
    ],
    'Past Perfect': [
      {tipo:'Afirmativa', en:`She had already <em>${p}ped</em> by the time I called her.`, es:`Ya había ${esPhrase} para cuando la llamé.`},
      {tipo:'Negativa',   en:`She hadn't <em>${p}ped</em> yet when we arrived — she was still fighting.`, es:`Todavía no había ${esPhrase} cuando llegamos — seguía luchando.`},
      {tipo:'Pregunta',   en:`Had she <em>${p}ped</em> before we stepped in to help?`, es:`¿Había ${esPhrase} antes de que interviniéramos para ayudar?`}
    ],
    'Future Simple (will)': [
      {tipo:'Afirmativa', en:`She will <em>${p}</em> if the situation doesn't improve soon.`, es:`${esPhrase.charAt(0).toUpperCase()+esPhrase.slice(1)} si la situación no mejora pronto.`},
      {tipo:'Negativa',   en:`She won't <em>${p}</em> — she's determined to see this through.`, es:`No ${esPhrase} — está decidida a ver esto hasta el final.`},
      {tipo:'Pregunta',   en:`Will she <em>${p}</em> or keep pushing forward?`, es:`¿${esPhrase.charAt(0).toUpperCase()+esPhrase.slice(1)} o seguirá adelante?`}
    ],
  };

  // For conditionals, build integrated examples
  const condExamples = {
    t1: [
      {en:`If things improve, she will <em>${p}</em> on the old strategy.`, es:`Si las cosas mejoran, ${esPhrase} en la estrategia antigua.`},
    ],
    t2: [
      {en:`If she had more support, she wouldn't <em>${p}</em> so quickly.`, es:`Si tuviera más apoyo, no ${esPhrase} tan rápido.`},
    ],
    t3: [
      {en:`If the team had communicated better, she wouldn't have <em>${p}ped</em>.`, es:`Si el equipo se hubiera comunicado mejor, no habría ${esPhrase}.`},
    ],
    mix: [
      {en:`If she hadn't <em>${p}ped</em> back then, she would be leading the project now.`, es:`Si no hubiera ${esPhrase} entonces, ahora estaría liderando el proyecto.`},
    ],
  };

  return {scenarios, condExamples};
}

function renderTenseCard(){
  const t=tenseData[currentTense];
  const card=document.getElementById('tense-card');
  const pv=phrasalData[todayIdx];
  const {scenarios,condExamples}=getTenseExamplesForPhrsal(pv);
  const pvBadge=`<span class="badge badge-neutro" style="font-size:.65rem;margin-left:.5rem;vertical-align:middle;">con: <em>${pv.phrase}</em></span>`;

  if(t.conditionals){
    const {blocks,errors,anchor}=t.conditionals;
    // Inject phrasal verb example into each conditional block
    const pvExMap={0:condExamples.t1,1:condExamples.t2,2:condExamples.t3,3:condExamples.mix};
    card.innerHTML=`
      <div class="card-header"><div>
        <div class="item-title" style="font-size:1.6rem;">Condicionales en inglés</div>
        <div class="item-subtitle">Tipos 1, 2, 3 y mixto · could, should, would have</div>
      </div></div>
      ${blocks.map((b,bi)=>`
        <div class="cond-section">
          <div class="section-label">${b.title}</div>
          <div class="cond-formula">${b.formula}</div>
          <div class="context-box" style="margin-bottom:.75rem;">${b.desc}</div>
          <ul class="examples-list">
            ${b.examples.map(e=>`<li class="example-item"><div class="example-en">${e.en}</div><div class="example-es">${e.es}</div></li>`).join('')}
          </ul>
          <div class="section-label" style="margin-top:1rem;">Ejemplo con "${pv.phrase}"</div>
          <ul class="examples-list">
            ${(pvExMap[bi]||[]).map(e=>`<li class="example-item" style="border-left:3px solid var(--accent);padding-left:.75rem;"><div class="example-en">${e.en}</div><div class="example-es">${e.es}</div></li>`).join('')}
          </ul>
        </div>
      `).join('<div style="height:1px;background:var(--border);margin:1.5rem 0;"></div>')}
      <div class="section-label" style="margin-top:1.5rem;">Errores clásicos de hispanohablantes</div>
      <ul class="error-list">${errors.map(e=>`<li class="error-item"><span class="error-icon">✗</span><span>${e}</span></li>`).join('')}</ul>
      <div class="section-label">Conector con el español</div>
      <div class="anchor-box">${anchor}</div>`;
  } else {
    const dynTable = scenarios[t.name] || t.table;
    card.innerHTML=`
      <div class="card-header"><div>
        <div class="item-title" style="font-size:1.75rem;">${t.name} ${pvBadge}</div>
      </div></div>
      <div class="section-label">Fórmula</div>
      <div class="formula-box">${t.formula}</div>
      <div class="section-label">Cuándo se usa</div>
      <ul class="examples-list">${t.rules.map(r=>`<li class="example-item"><div class="example-en" style="font-weight:400;">${r.rule}</div><div class="example-es" style="font-style:italic;">${r.ex}</div></li>`).join('')}</ul>
      <div class="section-label">Afirmativa · Negativa · Pregunta ${scenarios[t.name]?'<span style="font-size:.7rem;color:var(--accent);font-weight:400;margin-left:.25rem;">con: '+pv.phrase+'</span>':''}</div>
      <div style="overflow-x:auto;border-radius:10px;border:1px solid var(--border);">
        <table class="tense-table"><thead><tr><th style="width:80px;">Tipo</th><th>Inglés</th><th>Español</th></tr></thead>
        <tbody>${dynTable.map(r=>`<tr><td>${r.tipo}</td><td>${r.en}</td><td style="color:var(--muted);font-size:.82rem;">${r.es}</td></tr>`).join('')}</tbody></table>
      </div>
      <div class="section-label">Errores comunes de hispanohablantes</div>
      <ul class="error-list">${t.errors.map(e=>`<li class="error-item"><span class="error-icon">✗</span><span>${e}</span></li>`).join('')}</ul>
      <div class="section-label">Conector con el español</div>
      <div class="anchor-box">${t.anchor}</div>`;
  }
}

renderTenseNav();
renderTenseCard();
</script>
