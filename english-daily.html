<!DOCTYPE html>
<html lang="es">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="English Daily">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1A1714">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231A1714'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='%23A8C5B5' font-family='Georgia,serif' font-style='italic'%3EE%3C/text%3E%3C/svg%3E">

<title>English Daily</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F5F0;--surface:#FFFFFF;--border:#E2DDD6;--text:#1A1714;--muted:#7A7570;
  --accent:#2A6049;--accent-light:#EAF3EE;--blue:#1A3A5C;--blue-light:#EBF1F8;
  --amber:#92600A;--amber-light:#FDF4E3;--red-light:#FEF0F0;--red:#9A2020;
  --tag-informal-bg:#F8EBF3;--tag-informal:#5C1A3A;
  --tag-formal-bg:#EBF1F8;--tag-formal:#1A3A5C;
  --tag-neutro-bg:#EBF8EB;--tag-neutro:#3A5C1A;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:4rem;}
header{background:var(--text);color:#F7F5F0;padding:1.25rem 2rem;display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
.logo{font-family:'Playfair Display',serif;font-size:1.5rem;letter-spacing:-.02em;}
.logo em{font-style:italic;color:#A8C5B5;}
.date-badge{font-family:'DM Mono',monospace;font-size:.75rem;color:#A8A09A;letter-spacing:.08em;text-transform:uppercase;}
nav{display:flex;gap:0;padding:0 2rem;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;}
.tab-btn{font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:none;border:none;border-bottom:2.5px solid transparent;padding:1rem 1.25rem;cursor:pointer;white-space:nowrap;transition:color .2s,border-color .2s;}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text);}
.tab-btn:hover:not(.active){color:var(--text);}
main{max-width:760px;margin:0 auto;padding:2rem 1.25rem;}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;margin-bottom:1rem;}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.item-title{font-family:'Playfair Display',serif;font-size:2.25rem;font-weight:600;line-height:1.1;letter-spacing:-.02em;}
.item-subtitle{font-size:1rem;color:var(--muted);margin-top:.35rem;font-weight:300;}
.badge{display:inline-block;font-size:.7rem;font-weight:500;letter-spacing:.07em;text-transform:uppercase;padding:.3rem .75rem;border-radius:99px;flex-shrink:0;margin-top:.5rem;}
.badge-informal{background:var(--tag-informal-bg);color:var(--tag-informal);}
.badge-formal{background:var(--tag-formal-bg);color:var(--tag-formal);}
.badge-neutro{background:var(--tag-neutro-bg);color:var(--tag-neutro);}
.badge-amber{background:var(--amber-light);color:var(--amber);}
.section-label{font-size:.68rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;margin-top:1.5rem;}
.context-box{background:var(--bg);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:.85rem 1rem;font-size:.9rem;line-height:1.6;}
.examples-list{list-style:none;display:flex;flex-direction:column;gap:.75rem;}
.example-item{background:var(--bg);border-radius:10px;padding:.85rem 1rem;}
.example-en{font-size:.95rem;font-weight:500;line-height:1.5;}
.example-en em{font-family:'Playfair Display',serif;font-style:italic;color:var(--accent);}
.example-es{font-size:.82rem;color:var(--muted);margin-top:.25rem;line-height:1.4;}
.tip-box{background:var(--accent-light);border-radius:10px;padding:.85rem 1rem;font-size:.88rem;line-height:1.6;color:var(--accent);}
.day-indicator{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted);margin-bottom:.5rem;}

/* MODAL PANORAMIC */
.modal-grid{display:flex;flex-direction:column;gap:1rem;}
.modal-row{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.modal-row-header{display:flex;align-items:center;gap:1rem;padding:1.1rem 1.25rem;cursor:pointer;user-select:none;}
.modal-row-header:hover{background:var(--bg);}
.modal-name{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:600;min-width:90px;}
.modal-es{font-size:.85rem;color:var(--muted);flex:1;line-height:1.4;}
.modal-prob-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:110px;}
.modal-prob-num{font-family:'DM Mono',monospace;font-size:.8rem;color:var(--amber);font-weight:500;}
.modal-bar-bg{height:5px;background:var(--border);border-radius:99px;width:100px;overflow:hidden;}
.modal-bar-fill{height:100%;border-radius:99px;background:var(--accent);}
.modal-chevron{font-size:.8rem;color:var(--muted);transition:transform .25s;margin-left:.5rem;}
.modal-row.open .modal-chevron{transform:rotate(180deg);}
.modal-detail{display:none;border-top:1px solid var(--border);padding:1.25rem;}
.modal-row.open .modal-detail{display:block;}
.prob-label-row{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:.4rem;}
.prob-label-row strong{color:var(--accent);}
.full-bar-bg{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:1rem;}
.full-bar-fill{height:100%;border-radius:99px;background:var(--accent);}
.compare-box{border:1px solid var(--border);border-radius:10px;padding:.85rem 1rem;font-size:.88rem;line-height:1.7;margin-bottom:.75rem;}
.rule-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:.75rem;}
.rule-card{border-radius:10px;padding:.85rem 1rem;font-size:.85rem;line-height:1.6;}
.rule-si{background:var(--accent-light);}.rule-no{background:var(--red-light);}
.rule-card strong{font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:.35rem;}
.rule-si strong{color:var(--accent);}.rule-no strong{color:var(--red);}

/* TENSE */
.formula-box{font-family:'DM Mono',monospace;font-size:.9rem;background:var(--text);color:#A8C5B5;border-radius:10px;padding:.85rem 1.25rem;letter-spacing:.02em;}
.tense-table{width:100%;border-collapse:collapse;font-size:.85rem;}
.tense-table th{text-align:left;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:500;padding:.5rem .75rem;border-bottom:1px solid var(--border);}
.tense-table td{padding:.65rem .75rem;border-bottom:1px solid var(--bg);line-height:1.5;vertical-align:top;}
.tense-table tr:last-child td{border-bottom:none;}
.tense-table td:first-child{font-weight:500;color:var(--accent);font-size:.78rem;letter-spacing:.04em;}
.error-list{list-style:none;display:flex;flex-direction:column;gap:.5rem;}
.error-item{display:flex;gap:.75rem;align-items:flex-start;font-size:.88rem;line-height:1.5;}
.error-icon{color:var(--red);flex-shrink:0;font-size:.75rem;margin-top:3px;}
.anchor-box{background:var(--blue-light);border-radius:10px;padding:.85rem 1rem;font-size:.88rem;line-height:1.6;color:var(--blue);}
.tense-nav{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap;}
.tense-nav-btn{font-size:.78rem;font-weight:500;padding:.4rem .9rem;border-radius:99px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--muted);transition:all .2s;}
.tense-nav-btn.active{background:var(--text);color:#F7F5F0;border-color:var(--text);}
.tense-nav-btn:hover:not(.active){background:var(--surface);color:var(--text);}
.cond-section{margin-top:1.25rem;}
.cond-block{background:var(--bg);border-radius:10px;padding:1rem;margin-bottom:.75rem;}
.cond-block-title{font-size:.75rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);margin-bottom:.6rem;}
.cond-formula{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--text);margin-bottom:.5rem;background:var(--surface);padding:.5rem .75rem;border-radius:6px;border:1px solid var(--border);}
.cond-ex{font-size:.88rem;line-height:1.6;margin-bottom:.25rem;}
.cond-ex-es{font-size:.8rem;color:var(--muted);}

@media(max-width:520px){
  main{padding:1.25rem 1rem;}.card{padding:1.25rem;}
  .item-title{font-size:1.75rem;}.rule-grid{grid-template-columns:1fr;}
  .modal-prob-wrap{min-width:80px;}.modal-bar-bg{width:70px;}
}

.progress-bar-wrap{margin-bottom:1.25rem;}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;}
.progress-label{font-size:.75rem;color:var(--muted);}
.progress-count{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--accent);font-weight:500;}
.progress-bg{height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;background:var(--accent);transition:width .4s ease;}
.day-meta{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);margin-bottom:1rem;line-height:1.6;}
.reset-btn{font-size:.72rem;color:#9A2020;background:none;border:none;cursor:pointer;text-decoration:underline;padding:0;margin-top:.25rem;display:block;}
</style>
</head>
<body>

<header>
  <div class="logo">English <em>Daily</em></div>
  <div class="date-badge" id="date-display"></div>
</header>

<nav>
  <button class="tab-btn active" onclick="switchTab('phrasal',this)">Phrasal Verb</button>
  <button class="tab-btn" onclick="switchTab('modal',this)">Modales</button>
  <button class="tab-btn" onclick="switchTab('tense',this)">Tiempos verbales</button>
</nav>

<main>
  <div class="tab-panel active" id="tab-phrasal">
    <div class="card" id="phrasal-card"></div>
  </div>
  <div class="tab-panel" id="tab-modal">
    <div class="modal-grid" id="modal-grid"></div>
  </div>
  <div class="tab-panel" id="tab-tense">
    <div class="tense-nav" id="tense-nav"></div>
    <div class="card" id="tense-card"></div>
  </div>
</main>

<script>
// ─── DATE ───────────────────────────────────────────────────────────────────
const DAYS_ES=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MONTHS_ES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const now=new Date();
const todayStr=now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate();
document.getElementById('date-display').textContent=
  DAYS_ES[now.getDay()]+' '+now.getDate()+' de '+MONTHS_ES[now.getMonth()]+' '+now.getFullYear();

function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

// ─── PHRASAL VERBS (30 items, 1 per day by date) ────────────────────────────
const phrasalData=[
  {phrase:'give up',es:'rendirse / abandonar',register:'informal',
   context:'Se usa cuando alguien deja de intentar algo por frustración o convicción. Muy común en conversaciones cotidianas, motivación personal y redes sociales.',
   examples:[
     {en:'Don\'t <em>give up</em> on your dreams, even when it gets hard.',es:'No te rindas con tus sueños, incluso cuando se ponga difícil.'},
     {en:'She finally <em>gave up</em> trying to fix the printer and called IT.',es:'Finalmente se rindió tratando de arreglar la impresora y llamó a soporte.'},
     {en:'I\'m not going to <em>give up</em> just because one client said no.',es:'No voy a rendirme solo porque un cliente dijo que no.'}
   ],
   tip:'Piensa en give (dar) + up (arriba) → soltar hacia arriba = dejar ir. Lo opuesto es "keep going" o "persist".',
   extra:'También se usa como sustantivo: "That attitude is a recipe for a total give-up mentality." Combinación frecuente: "give up on someone" (rendirse con alguien).'
  },
  {phrase:'look into',es:'investigar / examinar a fondo',register:'neutro',
   context:'Ideal para contextos laborales y académicos. Se usa cuando alguien va a revisar o analizar un asunto más a fondo. Muy profesional y versátil.',
   examples:[
     {en:'I\'ll <em>look into</em> the issue and get back to you by Friday.',es:'Revisaré el tema y te respondo el viernes.'},
     {en:'The manager promised to <em>look into</em> the salary discrepancy.',es:'La gerente prometió investigar la discrepancia salarial.'},
     {en:'We\'re <em>looking into</em> new suppliers to reduce costs.',es:'Estamos investigando nuevos proveedores para reducir costos.'}
   ],
   tip:'"Look into" = meter la vista dentro de algo → examinar a fondo. No confundir con "look at" (solo mirar superficialmente).',
   extra:'En reuniones de trabajo, "I\'ll look into it" es la respuesta perfecta cuando no tienes la información en el momento pero te comprometes a conseguirla.'
  },
  {phrase:'run out of',es:'quedarse sin / agotar',register:'neutro',
   context:'Se usa cuando algo se acaba o no hay más disponible. Aplica para cosas físicas (dinero, comida) y abstractas (tiempo, ideas, paciencia).',
   examples:[
     {en:'We <em>ran out of</em> coffee in the office, so everyone\'s cranky.',es:'Se nos acabó el café en la oficina, así que todos están de mal humor.'},
     {en:'I\'m <em>running out of</em> time to finish this report.',es:'Se me está acabando el tiempo para terminar este informe.'},
     {en:'Don\'t <em>run out of</em> battery during the presentation.',es:'No te quedes sin batería durante la presentación.'}
   ],
   tip:'"Run out" = correr hacia afuera → el stock sale corriendo. Siempre va seguido de "of" cuando nombras qué se agotó.',
   extra:'Errores comunes: "I ran out money" → siempre necesita "of": "I ran out of money". No puede usarse en pasiva: no digas "money was run out".'
  },
  {phrase:'bring up',es:'mencionar / sacar a colación',register:'neutro',
   context:'Se usa en conversaciones y reuniones cuando alguien introduce un tema que no estaba en la agenda. También significa "criar hijos" en otro contexto distinto.',
   examples:[
     {en:'Can I <em>bring up</em> something before we close the meeting?',es:'¿Puedo mencionar algo antes de cerrar la reunión?'},
     {en:'She <em>brought up</em> the budget issue right before the deadline.',es:'Ella sacó el tema del presupuesto justo antes de la fecha límite.'},
     {en:'Try not to <em>bring up</em> politics at the family dinner.',es:'Trata de no sacar el tema de política en la cena familiar.'}
   ],
   tip:'"Bring up" = traer hacia arriba → traer a la superficie un tema que estaba "abajo". Sinónimo formal: "raise a point".',
   extra:'Doble significado importante: "She was brought up in Santiago" = ella se crió en Santiago. El contexto siempre lo aclara: si hablas de personas jóvenes = criar; si hablas de temas = mencionar.'
  },
  {phrase:'figure out',es:'descubrir / resolver / entender',register:'informal',
   context:'Muy común en inglés americano. Se usa cuando alguien logra entender algo confuso o resolver un problema. Frecuentísimo en tecnología, trabajo y vida diaria.',
   examples:[
     {en:'I finally <em>figured out</em> how to use the new software.',es:'Por fin entendí cómo usar el nuevo software.'},
     {en:'We need to <em>figure out</em> why sales dropped last quarter.',es:'Necesitamos descubrir por qué bajaron las ventas el trimestre pasado.'},
     {en:'I can\'t <em>figure out</em> what she meant by that comment.',es:'No puedo entender qué quiso decir con ese comentario.'}
   ],
   tip:'"Figure" en inglés antiguo = forma → darle forma a algo en tu mente = entenderlo. Sinónimo formal: "determine", "identify", "work out".',
   extra:'"Work out" es casi sinónimo pero más común en inglés británico: "I\'m still trying to work out how this happened." Ambos son igualmente válidos en contextos profesionales.'
  },
  {phrase:'carry on',es:'continuar / seguir adelante',register:'formal',
   context:'Más común en inglés británico pero entendido globalmente. Se usa para decir que algo debe continuar a pesar de obstáculos. Tono serio y resolutivo.',
   examples:[
     {en:'Please <em>carry on</em> with your presentation; I\'ll join in a moment.',es:'Por favor continúa con tu presentación; me uno en un momento.'},
     {en:'Despite the setback, the team <em>carried on</em> with the launch.',es:'A pesar del contratiempo, el equipo siguió adelante con el lanzamiento.'},
     {en:'<em>Carry on</em> — we\'ll address those questions at the end.',es:'Continúa — abordaremos esas preguntas al final.'}
   ],
   tip:'Famoso por el póster británico WWII: "Keep Calm and Carry On". Más formal y serio que "keep going" o "go on".',
   extra:'"Carry on" puede sonar anticuado en inglés americano casual. Para conversaciones informales, prefiere "keep going" o "go ahead". En correos formales, "carry on" funciona perfectamente.'
  },
  {phrase:'put off',es:'posponer / aplazar / procrastinar',register:'informal',
   context:'Se usa cuando algo se retrasa, ya sea voluntariamente (procrastinar) o por circunstancias externas. También puede significar "desanimar" o "disgustar" en otro contexto.',
   examples:[
     {en:'Stop <em>putting off</em> that doctor\'s appointment — call today.',es:'Deja de postergar esa cita médica — llama hoy.'},
     {en:'The meeting was <em>put off</em> until next week due to the storm.',es:'La reunión fue aplazada hasta la próxima semana por la tormenta.'},
     {en:'I\'ve been <em>putting off</em> learning Excel for months.',es:'He estado postergando aprender Excel por meses.'}
   ],
   tip:'Imagina "put" (poner) + "off" (apagado) → apagar algo temporalmente, dejarlo para después. Sinónimo formal: "postpone", "defer".',
   extra:'Segundo significado: "That smell puts me off my food" = ese olor me quita el apetito / me desanima. "She was put off by his attitude" = su actitud la desanimó. El contexto lo diferencia.'
  },
  {phrase:'come across',es:'encontrarse con / causar impresión de',register:'neutro',
   context:'Tiene dos usos: (1) encontrar algo por casualidad, (2) causar cierta impresión en los demás. El contexto lo aclara siempre. Muy útil en entrevistas y presentaciones.',
   examples:[
     {en:'I <em>came across</em> an interesting article about remote work this morning.',es:'Me encontré con un artículo interesante sobre trabajo remoto esta mañana.'},
     {en:'In the interview, try not to <em>come across</em> as arrogant.',es:'En la entrevista, trata de no dar la impresión de ser arrogante.'},
     {en:'She <em>comes across</em> as very confident in meetings.',es:'Ella da la impresión de ser muy segura en las reuniones.'}
   ],
   tip:'Doble función: accidental + percepción. Personas → impresión. Objetos/ideas → encontrar por casualidad.',
   extra:'"How do I come across in this email?" es una pregunta muy práctica para pedir feedback sobre el tono de un texto. También: "come across as genuine" = parecer genuino/auténtico.'
  },
  {phrase:'take over',es:'hacerse cargo / tomar control / adquirir',register:'neutro',
   context:'Se usa en negocios (adquisición de empresa), trabajo (asumir responsabilidad) y conversaciones (dominar el turno). Muy frecuente en contextos corporativos y noticias.',
   examples:[
     {en:'She\'ll <em>take over</em> as project lead while I\'m on leave.',es:'Ella se hará cargo como líder del proyecto mientras estoy de licencia.'},
     {en:'The startup was <em>taken over</em> by a larger tech company.',es:'La startup fue adquirida por una empresa tecnológica más grande.'},
     {en:'Don\'t let negative thoughts <em>take over</em> — refocus.',es:'No dejes que los pensamientos negativos tomen control — reenfócate.'}
   ],
   tip:'"Take over" = tomar por encima → escalar hasta quedar al mando. El sustantivo "takeover" (sin espacio) se usa en noticias: "hostile takeover".',
   extra:'"Take over from" = reemplazar a alguien específico: "He took over from the previous manager last March." El "from" indica el traspaso concreto de responsabilidad.'
  },
  {phrase:'set up',es:'configurar / establecer / fundar / montar',register:'neutro',
   context:'Uno de los phrasal verbs más versátiles. Aplica para tecnología (configurar), negocios (fundar), espacios (montar) y personas (presentar a alguien / tender una trampa).',
   examples:[
     {en:'Can you help me <em>set up</em> the projector before the clients arrive?',es:'¿Me puedes ayudar a instalar el proyector antes de que lleguen los clientes?'},
     {en:'They <em>set up</em> a new branch office in Santiago last year.',es:'Abrieron una nueva sucursal en Santiago el año pasado.'},
     {en:'I need to <em>set up</em> my new phone — it\'s still in factory mode.',es:'Necesito configurar mi nuevo teléfono — todavía está en modo de fábrica.'}
   ],
   tip:'"Set up" = poner en su sitio → preparar algo para que funcione. El sustantivo "setup" (sin espacio) es la configuración resultante.',
   extra:'Tercer significado informal: "He was set up" = le tendieron una trampa. En tecnología, "setup wizard" = asistente de configuración. Muy productivo en inglés corporativo.'
  },
  {phrase:'follow up',es:'hacer seguimiento / dar continuidad',register:'neutro',
   context:'Imprescindible en el mundo laboral. Se usa cuando alguien vuelve a contactar a otra persona para revisar el estado de algo pendiente. Muy frecuente en correos.',
   examples:[
     {en:'I\'m <em>following up</em> on my email from last week — any update?',es:'Estoy haciendo seguimiento a mi correo de la semana pasada — ¿alguna novedad?'},
     {en:'Please <em>follow up</em> with the supplier about the delivery date.',es:'Por favor haz seguimiento con el proveedor sobre la fecha de entrega.'},
     {en:'We\'ll <em>follow up</em> after the meeting to confirm the next steps.',es:'Haremos seguimiento después de la reunión para confirmar los próximos pasos.'}
   ],
   tip:'"Follow up" = seguir hacia arriba → mantener el hilo. El sustantivo "follow-up" (con guión): "a follow-up email", "a follow-up meeting".',
   extra:'La frase "Just following up" al inicio de un correo es la forma más común y cortés de recordar algo pendiente sin sonar insistente en inglés profesional.'
  },
  {phrase:'break down',es:'descomponerse / desglosar / derrumbarse',register:'neutro',
   context:'Triple significado: (1) una máquina deja de funcionar, (2) analizar algo en partes, (3) una persona pierde el control emocional. El contexto lo diferencia.',
   examples:[
     {en:'The car <em>broke down</em> on the highway — we had to call a tow truck.',es:'El auto se descompuso en la autopista — tuvimos que llamar a una grúa.'},
     {en:'Can you <em>break down</em> the costs for us? We need the detail.',es:'¿Puedes desglosar los costos? Necesitamos el detalle.'},
     {en:'She <em>broke down</em> when she heard the news.',es:'Ella se derrumbó cuando escuchó la noticia.'}
   ],
   tip:'Recuerda los 3 contextos: máquina = avería, datos = desglosar, personas = crisis emocional. El sustantivo: "breakdown" (sin espacio).',
   extra:'"Have a breakdown" = sufrir una crisis. "A breakdown of costs" = un desglose de costos. "The negotiation broke down" = las negociaciones fracasaron. Muy rico en contextos distintos.'
  },
  {phrase:'point out',es:'señalar / hacer notar / indicar',register:'neutro',
   context:'Se usa para llamar la atención sobre algo que otros pueden no haber notado. Es una forma educada y directa de introducir una observación o corrección.',
   examples:[
     {en:'I\'d like to <em>point out</em> that the deadline was already extended twice.',es:'Me gustaría señalar que el plazo ya se extendió dos veces.'},
     {en:'She <em>pointed out</em> several errors in the first draft.',es:'Ella señaló varios errores en el primer borrador.'},
     {en:'As the report <em>points out</em>, customer satisfaction dropped in Q2.',es:'Como señala el informe, la satisfacción del cliente cayó en el segundo trimestre.'}
   ],
   tip:'"Point out" = apuntar hacia afuera → mostrarle algo a alguien. Más educado que simplemente "say" cuando corriges o adviertes algo.',
   extra:'"It\'s worth pointing out that..." es una construcción muy útil en presentaciones y correos formales para introducir una observación importante sin sonar confrontacional.'
  },
  {phrase:'deal with',es:'lidiar con / manejar / encargarse de',register:'neutro',
   context:'Se usa para hablar de cómo alguien enfrenta problemas, situaciones difíciles o tareas pendientes. Es una de las combinaciones más frecuentes en inglés profesional.',
   examples:[
     {en:'I\'ll <em>deal with</em> the client complaint first thing tomorrow.',es:'Me encargaré de la queja del cliente a primera hora mañana.'},
     {en:'How do you usually <em>deal with</em> stress at work?',es:'¿Cómo manejas normalmente el estrés en el trabajo?'},
     {en:'We need someone who can <em>deal with</em> difficult suppliers.',es:'Necesitamos a alguien que pueda lidiar con proveedores difíciles.'}
   ],
   tip:'"Deal with" = hacer un trato con → negociar la situación hasta resolverla. Más activo que "handle" en contextos emocionales.',
   extra:'"Deal with it" (imperativo informal) puede sonar agresivo. En contextos formales, prefiere "address the issue" o "manage the situation" para mayor diplomacia.'
  },
  {phrase:'turn out',es:'resultar ser / salir (de una forma inesperada)',register:'neutro',
   context:'Se usa para expresar cómo resultó algo, especialmente cuando el resultado es diferente a lo esperado. Expresa descubrimiento o revelación de un resultado.',
   examples:[
     {en:'The project <em>turned out</em> better than we expected.',es:'El proyecto resultó mejor de lo que esperábamos.'},
     {en:'It <em>turns out</em> the file was saved in the wrong folder.',es:'Resulta que el archivo se guardó en la carpeta equivocada.'},
     {en:'How did the presentation <em>turn out</em>?',es:'¿Cómo salió la presentación?'}
   ],
   tip:'"Turn out" = girar hacia afuera → revelar lo que había adentro. "It turns out..." es la forma más natural de decir "resulta que..." en inglés.',
   extra:'"As it turned out" es una frase conector muy útil en narrativas: "As it turned out, the decision was the right one after all." Expresa retrospección elegante.'
  },
  {phrase:'go through',es:'pasar por / revisar / atravesar',register:'neutro',
   context:'Tres usos principales: (1) experimentar algo difícil, (2) revisar algo detalladamente, (3) completar un proceso. Muy frecuente en contextos laborales y personales.',
   examples:[
     {en:'She\'s <em>going through</em> a tough time — be patient with her.',es:'Está pasando por un momento difícil — ten paciencia con ella.'},
     {en:'Let\'s <em>go through</em> the agenda before the meeting starts.',es:'Revisemos la agenda antes de que empiece la reunión.'},
     {en:'The deal didn\'t <em>go through</em> — the client backed out.',es:'El trato no se concretó — el cliente se echó atrás.'}
   ],
   tip:'"Go through" = pasar a través → atravesar algo de principio a fin. Sinónimos: "experience" (emocional), "review" (revisar), "be approved" (proceso).',
   extra:'"Go through with something" = llevar algo a cabo a pesar de las dudas: "Are you going to go through with the merger?" Añade la partícula "with" para completar esta acción.'
  },
  {phrase:'make up',es:'inventar / reconciliarse / compensar / maquillarse',register:'informal',
   context:'Uno de los phrasal verbs con más acepciones. El contexto es clave: inventar historias, reconciliarse tras una pelea, compensar tiempo perdido o aplicar maquillaje.',
   examples:[
     {en:'He <em>made up</em> an excuse for being late — nobody believed him.',es:'Inventó una excusa por llegar tarde — nadie le creyó.'},
     {en:'They had a fight, but they <em>made up</em> the next morning.',es:'Tuvieron una pelea, pero se reconciliaron a la mañana siguiente.'},
     {en:'I need to <em>make up</em> for the time I lost during the holiday.',es:'Necesito compensar el tiempo que perdí durante las vacaciones.'}
   ],
   tip:'4 significados clave: inventar → "make up a story"; reconciliar → "make up after a fight"; compensar → "make up for"; maquillar → "make up your face".',
   extra:'"Make it up to someone" = resarcir a alguien: "I\'m sorry I missed your birthday — I\'ll make it up to you." Es una frase de disculpa muy natural y frecuente.'
  },
  {phrase:'take on',es:'asumir / contratar / enfrentarse a',register:'neutro',
   context:'Se usa cuando alguien acepta una nueva responsabilidad, contrata personal o se enfrenta a un desafío o competidor. Muy común en contextos corporativos.',
   examples:[
     {en:'She <em>took on</em> three new clients this quarter — impressive.',es:'Asumió tres nuevos clientes este trimestre — impresionante.'},
     {en:'We\'re planning to <em>take on</em> two junior developers next month.',es:'Planeamos contratar dos desarrolladores junior el próximo mes.'},
     {en:'Are you sure you want to <em>take on</em> that competitor? They\'re huge.',es:'¿Estás seguro de que quieres enfrentarte a ese competidor? Son enormes.'}
   ],
   tip:'"Take on" = tomar encima → cargar con algo o alguien. Puede usarse con trabajo (asumir), personas (contratar) o rivales (enfrentarse).',
   extra:'"Don\'t take on too much at once" = no te sobrecargues. Expresión de advertencia muy frecuente para quienes tienen tendencia a comprometerse en exceso.'
  },
  {phrase:'work out',es:'funcionar / resolver / hacer ejercicio / calcular',register:'neutro',
   context:'Muy versátil: (1) algo funciona o resulta bien, (2) resolver un problema, (3) hacer ejercicio físico, (4) calcular o deducir. Muy frecuente en inglés británico.',
   examples:[
     {en:'I hope this new strategy <em>works out</em> for the team.',es:'Espero que esta nueva estrategia funcione para el equipo.'},
     {en:'We need to <em>work out</em> the logistics before we commit.',es:'Necesitamos resolver la logística antes de comprometernos.'},
     {en:'She <em>works out</em> every morning before logging in.',es:'Ella hace ejercicio todas las mañanas antes de conectarse.'}
   ],
   tip:'"Work out" = trabajar hacia afuera → resolver algo sacándolo de la cabeza, o trabajar el cuerpo. El sustantivo "workout" = sesión de ejercicio.',
   extra:'"I can\'t work out why..." = No entiendo por qué... Muy útil en inglés británico para expresar confusión de forma educada sin sonar molesto.'
  },
  {phrase:'catch up',es:'ponerse al día / alcanzar',register:'informal',
   context:'Se usa cuando alguien necesita ponerse al día con trabajo, noticias o amigos. También se usa para alcanzar a alguien que va adelante (literal o figurado).',
   examples:[
     {en:'I missed Monday\'s meeting — can someone <em>catch me up</em>?',es:'Perdí la reunión del lunes — ¿alguien me puede poner al día?'},
     {en:'Let\'s have coffee and <em>catch up</em> — it\'s been months!',es:'Tomemos un café y pongámonos al día — ¡han sido meses!'},
     {en:'If we don\'t speed up, the competition will <em>catch up</em> fast.',es:'Si no aceleramos, la competencia nos alcanzará rápido.'}
   ],
   tip:'"Catch up" = atrapar hacia arriba → llegar al mismo nivel que los demás. El sustantivo "catch-up" o "catch-up call" = llamada de actualización.',
   extra:'"Catch-up meeting" es un término muy común en el trabajo para reuniones informales de actualización. "Let\'s schedule a quick catch-up" suena más natural que "update meeting" en muchos contextos.'
  },
  {phrase:'back up',es:'respaldar / hacer copia de seguridad / apoyar / retroceder',register:'neutro',
   context:'En tecnología: hacer backup. En conversación: apoyar la postura de alguien. En tráfico: retroceder. Tres contextos muy distintos con la misma estructura.',
   examples:[
     {en:'Always <em>back up</em> your files before updating the software.',es:'Siempre haz una copia de seguridad de tus archivos antes de actualizar el software.'},
     {en:'Can you <em>back me up</em> in the meeting? I need support on this.',es:'¿Me puedes respaldar en la reunión? Necesito apoyo en esto.'},
     {en:'<em>Back up</em> the car — there\'s more space on the left.',es:'Retrocede el auto — hay más espacio a la izquierda.'}
   ],
   tip:'"Back up" = volver hacia atrás → en datos: volver a tener; en personas: dar un paso atrás para apoyar. El sustantivo "backup" = respaldo.',
   extra:'"I\'ve got your back" es la versión más informal y emocional de "I\'ll back you up". El primero es apoyo personal; el segundo es apoyo en un argumento o situación concreta.'
  },
  {phrase:'fall behind',es:'quedarse atrás / atrasarse',register:'neutro',
   context:'Se usa cuando alguien o algo no avanza al ritmo esperado, ya sea en trabajo, estudios, pagos o compromisos. Tiene connotación de rezago involuntario.',
   examples:[
     {en:'We\'re <em>falling behind</em> on the timeline — we need to reassign tasks.',es:'Nos estamos atrasando en el cronograma — necesitamos reasignar tareas.'},
     {en:'If you miss too many classes, you\'ll <em>fall behind</em> quickly.',es:'Si faltas a demasiadas clases, te quedarás atrás rápidamente.'},
     {en:'He <em>fell behind</em> on his mortgage payments during the crisis.',es:'Se atrasó en los pagos de su hipoteca durante la crisis.'}
   ],
   tip:'"Fall behind" = caer detrás → perder el ritmo y quedar en una posición más baja que los demás. Lo opuesto es "catch up" (ponerse al día).',
   extra:'"Fall behind schedule" es una expresión muy común en gestión de proyectos. "We\'re slightly behind schedule but on track to recover" = estamos un poco atrasados pero en camino a recuperar.'
  },
  {phrase:'hold on',es:'esperar / aguantar / aferrarse',register:'informal',
   context:'Se usa para pedir a alguien que espere brevemente. También significa aguantar en una situación difícil o aferrarse físicamente a algo. Muy frecuente en llamadas.',
   examples:[
     {en:'<em>Hold on</em> a second — I need to check something before we continue.',es:'Espera un segundo — necesito revisar algo antes de continuar.'},
     {en:'<em>Hold on</em> tight — this is going to be a rough few months.',es:'Aguanta fuerte — van a ser unos meses difíciles.'},
     {en:'<em>Hold on</em>, did you say the deadline is tomorrow?',es:'Espera, ¿dijiste que el plazo es mañana?'}
   ],
   tip:'"Hold on" = quedarse agarrado → en el tiempo: esperar; en situaciones: resistir. Más informal y urgente que "please wait" o "one moment".',
   extra:'"Hold on" al inicio de una oración expresa sorpresa o necesidad de aclaración: "Hold on — that doesn\'t make sense." Equivale al "espera" o "un momento" del español coloquial.'
  },
  {phrase:'sort out',es:'resolver / organizar / aclarar',register:'neutro',
   context:'Muy común en inglés británico. Se usa para resolver problemas, organizar situaciones caóticas o aclarar malentendidos. Es práctico y resolutivo en tono.',
   examples:[
     {en:'Let me <em>sort out</em> this scheduling conflict and come back to you.',es:'Déjame resolver este conflicto de agenda y te respondo.'},
     {en:'We need to <em>sort out</em> who\'s responsible for the client onboarding.',es:'Necesitamos aclarar quién es responsable del onboarding del cliente.'},
     {en:'She <em>sorted out</em> the entire filing system in one afternoon.',es:'Organizó todo el sistema de archivos en una tarde.'}
   ],
   tip:'"Sort out" = ordenar hacia afuera → sacar el desorden y dejarlo ordenado. Más activo y resolutivo que simplemente "fix" o "solve".',
   extra:'"I\'ll sort it out" = me encargo / lo resuelvo. Muy usado en inglés británico como respuesta segura ante un problema. El equivalente americano más común sería "I\'ll take care of it".'
  },
  {phrase:'come up with',es:'idear / proponer / ocurrirse una idea',register:'neutro',
   context:'Se usa cuando alguien genera una idea, solución o plan nuevo. Es el phrasal verb de la creatividad y la resolución de problemas. Muy frecuente en brainstormings.',
   examples:[
     {en:'We need to <em>come up with</em> a new marketing angle by Thursday.',es:'Necesitamos idear un nuevo ángulo de marketing para el jueves.'},
     {en:'She <em>came up with</em> the solution in under five minutes.',es:'Ella propuso la solución en menos de cinco minutos.'},
     {en:'I can\'t <em>come up with</em> a good name for this product.',es:'No se me ocurre un buen nombre para este producto.'}
   ],
   tip:'"Come up with" = venir hacia arriba con algo → hacer que una idea suba a la superficie de tu mente. No puede separarse: siempre va junto.',
   extra:'"Come up with" es inseparable: no puedes decir "come an idea up with". Siempre el objeto va al final: "come up with a plan", "come up with an answer".'
  },
  {phrase:'put up with',es:'aguantar / tolerar / soportar',register:'informal',
   context:'Se usa para expresar tolerancia hacia algo molesto o desagradable. Siempre implica una incomodidad que se acepta, a veces a regañadientes.',
   examples:[
     {en:'I can\'t <em>put up with</em> this level of noise in the open office.',es:'No puedo aguantar este nivel de ruido en la oficina abierta.'},
     {en:'How do you <em>put up with</em> such a demanding client?',es:'¿Cómo aguantas a un cliente tan exigente?'},
     {en:'She <em>put up with</em> the long commute for two years before moving.',es:'Aguantó el largo trayecto durante dos años antes de mudarse.'}
   ],
   tip:'"Put up with" = poner hacia arriba con → cargar con algo pesado hacia arriba. Siempre lleva objeto: "put up with it", nunca solo "put up with".',
   extra:'Sinónimos: "tolerate" (formal), "stand" (informal): "I can\'t stand it". La diferencia: "tolerate" es neutro; "put up with" y "stand" implican que es difícil pero te aguantas.'
  },
  {phrase:'take up',es:'empezar / ocupar espacio/tiempo / retomar',register:'neutro',
   context:'Se usa cuando alguien comienza una nueva actividad o hobby. También cuando algo consume espacio, tiempo o recursos. Muy versátil en contextos cotidianos.',
   examples:[
     {en:'I recently <em>took up</em> running — it\'s been great for my stress.',es:'Recientemente empecé a correr — ha sido genial para mi estrés.'},
     {en:'These meetings <em>take up</em> half my day — I need to push back.',es:'Estas reuniones ocupan la mitad de mi día — necesito reducirlas.'},
     {en:'We\'ll <em>take up</em> this discussion again at next month\'s review.',es:'Retomaremos esta discusión en la revisión del próximo mes.'}
   ],
   tip:'"Take up" = tomar hacia arriba → agarrar algo nuevo y levantarlo, o que algo ocupa espacio/tiempo. Tres usos con la misma lógica de apropiación.',
   extra:'"I\'ll take you up on that offer" = acepto tu oferta / te tomo la palabra. Es una respuesta muy elegante cuando alguien te propone algo y decides aceptar.'
  },
  {phrase:'get away with',es:'salirse con la suya / escapar sin consecuencias',register:'informal',
   context:'Se usa cuando alguien hace algo incorrecto o arriesgado y no sufre consecuencias. Puede sonar positivo (lo logré) o negativo (es injusto que no pague las consecuencias).',
   examples:[
     {en:'He submitted the report late and <em>got away with</em> it — the boss didn\'t notice.',es:'Entregó el informe tarde y se salió con la suya — el jefe no se dio cuenta.'},
     {en:'You can\'t <em>get away with</em> vague answers in that interview.',es:'No puedes salirte con respuestas vagas en esa entrevista.'},
     {en:'She <em>gets away with</em> everything because she\'s the director\'s favorite.',es:'Se sale con la suya en todo porque es la favorita del director.'}
   ],
   tip:'"Get away with" = escapar llevándose algo → llevarse una acción sin pagar el precio. Siempre implica algo que no debería quedar sin consecuencias.',
   extra:'"You won\'t get away with it" = no te vas a salir con la tuya. Es una advertencia fuerte. En contextos legales: "He got away with fraud for years" = evadió la justicia durante años.'
  },
  {phrase:'look forward to',es:'esperar con ansias / tener ganas de',register:'neutro',
   context:'Expresa anticipación positiva hacia algo futuro. Es imprescindible en correos formales al despedirse. Siempre va seguido de sustantivo o verbo en -ing, nunca infinitivo.',
   examples:[
     {en:'I\'m <em>looking forward to</em> meeting the new team next week.',es:'Tengo muchas ganas de conocer al nuevo equipo la próxima semana.'},
     {en:'We <em>look forward to</em> your feedback on the proposal.',es:'Esperamos con ansias sus comentarios sobre la propuesta.'},
     {en:'I\'m really <em>looking forward to</em> the long weekend.',es:'Tengo muchas ganas de que llegue el fin de semana largo.'}
   ],
   tip:'Regla crítica: después de "forward to" siempre va -ing o sustantivo. NUNCA infinitivo: "I look forward to HEAR from you" → ERROR. "I look forward to HEARING from you" → CORRECTO.',
   extra:'"Looking forward to hearing from you" es la despedida de correo formal más usada en inglés profesional. Apréndetela de memoria — la usarás decenas de veces.'
  }
,
  {phrase:"call off",es:"cancelar / suspender",register:"neutro",context:"Se usa para cancelar algo planeado. M\u00e1s enf\u00e1tico que simplemente cancel \u2014 implica que algo ya estaba en marcha.",examples:[{en:"We had to <em>call off</em> the launch due to a last-minute bug.",es:"Tuvimos que cancelar el lanzamiento por un bug de \u00faltimo minuto."},{en:"The outdoor event was <em>called off</em> because of heavy rain.",es:"El evento al aire libre fue suspendido por las fuertes lluvias."},{en:"She <em>called off</em> the meeting when she saw the agenda wasn't ready.",es:"Cancel\u00f3 la reuni\u00f3n cuando vio que la agenda no estaba lista."}],tip:"'Call off' = llamar para que se vayan = cancelar. Sin\u00f3nimo formal: cancel, scrap, abandon.",extra:"'Call off' es ligeramente m\u00e1s enf\u00e1tico que 'cancel' \u2014 implica que algo ya estaba en marcha antes de parar."},
  {phrase:"draw up",es:"redactar / elaborar un documento formal",register:"formal",context:"Se usa cuando alguien prepara un documento formal: contrato, plan, lista, propuesta. Muy com\u00fan en contextos legales y empresariales.",examples:[{en:"The legal team will <em>draw up</em> the contract by end of week.",es:"El equipo legal redactar\u00e1 el contrato para fin de semana."},{en:"Let's <em>draw up</em> a plan before the next board meeting.",es:"Elaboremos un plan antes de la pr\u00f3xima reuni\u00f3n del directorio."},{en:"She was asked to <em>draw up</em> a shortlist of potential vendors.",es:"Le pidieron que preparara una lista corta de proveedores potenciales."}],tip:"'Draw up' = trazar hacia arriba = dar forma escrita a algo. Exclusivo para documentos y planes formales.",extra:"No confundir con 'draw up' literal (acercarse en veh\u00edculo). El contexto lo diferencia."},
  {phrase:"lay off",es:"despedir por recorte / dejar en paz",register:"neutro",context:"En contextos laborales: despedir empleados por razones econ\u00f3micas (no disciplinarias). En conversaci\u00f3n informal: dejar de molestar.",examples:[{en:"The company had to <em>lay off</em> 200 workers due to budget cuts.",es:"La empresa tuvo que despedir a 200 trabajadores por recortes presupuestarios."},{en:"He was <em>laid off</em> after 12 years \u2014 it was a real shock.",es:"Fue despedido despu\u00e9s de 12 a\u00f1os \u2014 fue un golpe duro."},{en:"<em>Lay off</em> the coffee \u2014 you've had four cups already.",es:"Deja de tomar caf\u00e9 \u2014 ya tomaste cuatro tazas."}],tip:"'Lay off' \u2260 'fire'. 'Fire' = despido disciplinario. 'Lay off' = recorte por razones econ\u00f3micas.",extra:"El sustantivo 'layoff' es muy com\u00fan en noticias corporativas. 'Mass layoffs' = despidos masivos."},
  {phrase:"take off",es:"despegar / quitarse / tener \u00e9xito repentino",register:"neutro",context:"Tres usos: (1) un avi\u00f3n despega, (2) quitarse ropa, (3) un proyecto o carrera despega repentinamente.",examples:[{en:"The flight <em>takes off</em> at 6 AM \u2014 don't be late.",es:"El vuelo despega a las 6 AM \u2014 no llegues tarde."},{en:"Please <em>take off</em> your shoes before entering.",es:"Por favor qu\u00edtate los zapatos antes de entrar."},{en:"Their podcast really <em>took off</em> after that viral episode.",es:"Su podcast realmente despeg\u00f3 despu\u00e9s de ese episodio viral."}],tip:"'Take off' = separarse del suelo \u2192 metaf\u00f3rico para \u00e9xito s\u00fabito. Sustantivo 'takeoff' en aviaci\u00f3n.",extra:"'Take some time off' = tomarse un tiempo libre. 'I'm taking Monday off' = no voy a trabajar el lunes."},
  {phrase:"check in",es:"registrarse / hacer seguimiento / conectarse",register:"neutro",context:"En hoteles y aeropuertos: registrarse. En trabajo: breve reuni\u00f3n de seguimiento. En relaciones: preguntar c\u00f3mo est\u00e1 alguien.",examples:[{en:"We <em>check in</em> at 3 PM \u2014 the hotel is ready by then.",es:"Hacemos check-in a las 3 PM \u2014 el hotel est\u00e1 listo para entonces."},{en:"Let's <em>check in</em> on Friday to see where everyone is with their tasks.",es:"Revisemos el viernes para ver c\u00f3mo va cada uno con sus tareas."},{en:"She always <em>checks in</em> with her team before starting a new project.",es:"Ella siempre se conecta con su equipo antes de empezar un proyecto nuevo."}],tip:"'Check in' = verificar que llegaste o que est\u00e1s bien. Sustantivo: 'check-in' (con gui\u00f3n).",extra:"'A quick check-in' = reuni\u00f3n corta de seguimiento. Muy com\u00fan en metodolog\u00edas \u00e1giles y trabajo remoto."},
  {phrase:"burn out",es:"agotarse / quemarse laboralmente",register:"neutro",context:"Se usa cuando alguien llega al l\u00edmite del agotamiento por sobrecarga de trabajo. Tambi\u00e9n una bombilla o motor que se quema.",examples:[{en:"If you keep working 12-hour days, you're going to <em>burn out</em>.",es:"Si sigues trabajando 12 horas al d\u00eda, te vas a quemar."},{en:"She <em>burned out</em> after the third consecutive product launch.",es:"Se quem\u00f3 despu\u00e9s del tercer lanzamiento de producto consecutivo."},{en:"The motor <em>burned out</em> \u2014 we need to replace it.",es:"El motor se quem\u00f3 \u2014 necesitamos reemplazarlo."}],tip:"'Burn out' = quemar hasta el l\u00edmite \u2192 no queda energ\u00eda. Sustantivo: 'burnout' = s\u00edndrome de agotamiento laboral.",extra:"'Burnout' es reconocido por la OMS como condici\u00f3n m\u00e9dica. Hablar de burnout abiertamente en el trabajo es cada vez m\u00e1s valorado."},
  {phrase:"speak up",es:"hablar m\u00e1s fuerte / alzar la voz",register:"neutro",context:"Para pedir que alguien hable m\u00e1s fuerte, o metaf\u00f3rico: animar a alguien a expresar su opini\u00f3n o defender su postura.",examples:[{en:"Could you <em>speak up</em>? I can barely hear you from the back.",es:"\u00bfPuedes hablar m\u00e1s fuerte? Apenas te escucho desde atr\u00e1s."},{en:"Don't be afraid to <em>speak up</em> in meetings \u2014 your ideas matter.",es:"No tengas miedo de alzar la voz en las reuniones \u2014 tus ideas importan."},{en:"She finally <em>spoke up</em> about the unfair treatment.",es:"Finalmente alz\u00f3 la voz sobre el trato injusto."}],tip:"'Speak up' = hablar hacia arriba = proyectar la voz o las ideas. Puede ser literal o figurado.",extra:"'Speak up for someone' = defender a alguien: 'He spoke up for his colleague when no one else would.'"},
  {phrase:"narrow down",es:"reducir / filtrar / acotar opciones",register:"neutro",context:"Se usa cuando se reduce un conjunto grande de opciones a una lista m\u00e1s peque\u00f1a. Muy com\u00fan en procesos de selecci\u00f3n y toma de decisiones.",examples:[{en:"We need to <em>narrow down</em> the candidates to three before Friday.",es:"Necesitamos reducir los candidatos a tres antes del viernes."},{en:"Can you <em>narrow down</em> the options? There are too many.",es:"\u00bfPuedes acotar las opciones? Hay demasiadas."},{en:"They've <em>narrowed down</em> the cause of the error to two possibilities.",es:"Han reducido la causa del error a dos posibilidades."}],tip:"'Narrow down' = estrechar hacia abajo = reducir el ancho de las opciones disponibles.",extra:"'Narrow it down' es instrucci\u00f3n com\u00fan en brainstormings: 'Let's narrow it down to our top 3.'"},
  {phrase:"cut down on",es:"reducir / disminuir el consumo de algo",register:"neutro",context:"Se usa cuando alguien reduce la cantidad de algo que consume habitualmente. Muy com\u00fan para h\u00e1bitos: comida, caf\u00e9, gastos.",examples:[{en:"I'm trying to <em>cut down on</em> sugar \u2014 doctor's orders.",es:"Estoy tratando de reducir el az\u00facar \u2014 \u00f3rdenes del m\u00e9dico."},{en:"We need to <em>cut down on</em> unnecessary spending this quarter.",es:"Necesitamos reducir los gastos innecesarios este trimestre."},{en:"He <em>cut down on</em> meetings and productivity went up immediately.",es:"Redujo las reuniones y la productividad subi\u00f3 de inmediato."}],tip:"'Cut down on' = cortar hacia abajo = reducir gradualmente. No implica eliminar completamente.",extra:"'Cut back on' es sin\u00f3nimo casi exacto. 'Cut out' = eliminar completamente. Distinto grado de reducci\u00f3n."},
  {phrase:"stand out",es:"destacar / sobresalir / llamar la atenci\u00f3n",register:"neutro",context:"Se usa cuando algo o alguien es notablemente diferente o superior a los dem\u00e1s. Positivo en la mayor\u00eda de contextos.",examples:[{en:"Her portfolio really <em>stands out</em> \u2014 she's clearly the top candidate.",es:"Su portafolio realmente destaca \u2014 claramente es la mejor candidata."},{en:"What makes your product <em>stand out</em> from the competition?",es:"\u00bfQu\u00e9 hace que tu producto se destaque de la competencia?"},{en:"He <em>stood out</em> as a natural leader from his first week.",es:"Sobresali\u00f3 como l\u00edder natural desde su primera semana."}],tip:"'Stand out' = pararse fuera del grupo = ser visible y notable. Lo opuesto: 'blend in' (pasar desapercibido).",extra:"'Stand-out' como adjetivo: 'a stand-out performance'. Muy usado en RRHH y marketing."},
  {phrase:"wrap up",es:"concluir / terminar / resumir",register:"neutro",context:"Se usa para cerrar una reuni\u00f3n, conversaci\u00f3n, proyecto o presentaci\u00f3n. Tambi\u00e9n para envolver un regalo f\u00edsicamente.",examples:[{en:"Let's <em>wrap up</em> the meeting \u2014 we've covered everything.",es:"Cerremos la reuni\u00f3n \u2014 hemos cubierto todo."},{en:"I need one more hour to <em>wrap up</em> this deliverable.",es:"Necesito una hora m\u00e1s para terminar este entregable."},{en:"Could you <em>wrap up</em> your presentation with a summary?",es:"\u00bfPodr\u00edas concluir tu presentaci\u00f3n con un resumen?"}],tip:"'Wrap up' = envolver para cerrar \u2192 terminar algo limpiamente. Muy usado en reuniones y proyectos.",extra:"'That's a wrap!' es la expresi\u00f3n de cierre en sets de filmaci\u00f3n. En el trabajo: 'Let's call it a wrap for today.'"},
  {phrase:"fill in",es:"rellenar / completar / informar a alguien",register:"neutro",context:"Dos usos: (1) completar un formulario, (2) informar a alguien de lo que se perdi\u00f3.",examples:[{en:"Please <em>fill in</em> this form before your appointment.",es:"Por favor rellena este formulario antes de tu cita."},{en:"Can someone <em>fill me in</em> on what happened in the meeting?",es:"\u00bfAlguien puede ponerme al tanto de lo que pas\u00f3 en la reuni\u00f3n?"},{en:"She <em>filled in</em> for the manager while he was on vacation.",es:"Ella cubri\u00f3 al gerente mientras estaba de vacaciones."}],tip:"'Fill in' = llenar los espacios vac\u00edos \u2192 en papel o en el conocimiento de alguien.",extra:"'Fill out' es sin\u00f3nimo de fill in para formularios (m\u00e1s com\u00fan en ingl\u00e9s americano)."},
  {phrase:"pick up",es:"recoger / aprender / mejorar / acelerarse",register:"neutro",context:"Uno de los m\u00e1s polis\u00e9micos: recoger algo/alguien, aprender algo naturalmente, mejorar un ritmo, o retomar donde se dej\u00f3.",examples:[{en:"Can you <em>pick up</em> the kids from school today?",es:"\u00bfPuedes recoger a los ni\u00f1os del colegio hoy?"},{en:"She <em>picked up</em> Spanish in just six months living in Madrid.",es:"Aprendi\u00f3 espa\u00f1ol en solo seis meses viviendo en Madrid."},{en:"Sales are finally starting to <em>pick up</em> after a slow quarter.",es:"Las ventas finalmente est\u00e1n empezando a repuntar despu\u00e9s de un trimestre lento."}],tip:"'Pick up' = recoger literalmente o metaf\u00f3rico (aprender sin esfuerzo, mejorar gradualmente).",extra:"'Pick up where we left off' = retomar donde lo dejamos. Expresi\u00f3n muy \u00fatil en reuniones de seguimiento."},
  {phrase:"bring about",es:"provocar / causar / generar un cambio",register:"formal",context:"Se usa para describir lo que caus\u00f3 o gener\u00f3 un resultado, especialmente cambios importantes. M\u00e1s formal que 'cause'.",examples:[{en:"The new policy <em>brought about</em> significant changes in the workflow.",es:"La nueva pol\u00edtica provoc\u00f3 cambios significativos en el flujo de trabajo."},{en:"What <em>brought about</em> this sudden shift in strategy?",es:"\u00bfQu\u00e9 caus\u00f3 este cambio repentino de estrategia?"},{en:"Technology has <em>brought about</em> a revolution in how we communicate.",es:"La tecnolog\u00eda ha generado una revoluci\u00f3n en c\u00f3mo nos comunicamos."}],tip:"'Bring about' = traer hacia la existencia = causar que algo ocurra. Sin\u00f3nimos: 'cause', 'lead to', 'result in'.",extra:"M\u00e1s formal y literario que 'cause'. Muy com\u00fan en textos acad\u00e9micos, informes y discursos."},
  {phrase:"look up",es:"buscar informaci\u00f3n / mejorar / admirar a alguien",register:"neutro",context:"Tres usos: (1) buscar info en un diccionario o internet, (2) que las cosas mejoran, (3) admirar a alguien.",examples:[{en:"I didn't know the word, so I <em>looked it up</em> on my phone.",es:"No sab\u00eda la palabra, as\u00ed que la busqu\u00e9 en el tel\u00e9fono."},{en:"Things are finally <em>looking up</em> after a difficult year.",es:"Las cosas finalmente est\u00e1n mejorando despu\u00e9s de un a\u00f1o dif\u00edcil."},{en:"She really <em>looks up to</em> her mentor \u2014 she admires her deeply.",es:"Ella realmente admira a su mentora \u2014 la respeta profundamente."}],tip:"'Look up' = mirar hacia arriba \u2192 buscar en fuentes o sentir admiraci\u00f3n.",extra:"'Things are looking up' = expresi\u00f3n optimista para indicar que una situaci\u00f3n negativa est\u00e1 mejorando."},
  {phrase:"put forward",es:"proponer / presentar / plantear",register:"formal",context:"Se usa para presentar formalmente una idea, propuesta o candidato. Muy com\u00fan en reuniones y debates.",examples:[{en:"She <em>put forward</em> an interesting proposal at the board meeting.",es:"Present\u00f3 una propuesta interesante en la reuni\u00f3n del directorio."},{en:"He was <em>put forward</em> as a candidate for the regional director position.",es:"Fue propuesto como candidato para el puesto de director regional."},{en:"Could you <em>put forward</em> your ideas before Thursday?",es:"\u00bfPodr\u00edas presentar tus ideas antes del jueves?"}],tip:"'Put forward' = poner hacia adelante = presentar algo al grupo. M\u00e1s formal que simplemente 'suggest'.",extra:"'Put forward a motion' = presentar una moci\u00f3n. 'Put someone forward' = nominar a alguien."},
  {phrase:"branch out",es:"diversificarse / expandirse a algo nuevo",register:"neutro",context:"Se usa cuando una persona o empresa ampl\u00eda su campo hacia nuevas \u00e1reas. Met\u00e1fora de una rama que crece desde el tronco principal.",examples:[{en:"The company decided to <em>branch out</em> into the Latin American market.",es:"La empresa decidi\u00f3 expandirse al mercado latinoamericano."},{en:"After 10 years in finance, she <em>branched out</em> into tech consulting.",es:"Despu\u00e9s de 10 a\u00f1os en finanzas, se aventur\u00f3 en la consultor\u00eda tecnol\u00f3gica."},{en:"It's time to <em>branch out</em> \u2014 we can't rely on just one product.",es:"Es hora de diversificarse \u2014 no podemos depender de un solo producto."}],tip:"'Branch out' = crecer como una rama hacia nuevas direcciones. Implica expansi\u00f3n voluntaria y positiva.",extra:"Muy usado en conversaciones sobre carrera profesional y estrategia empresarial."},
  {phrase:"drop off",es:"dejar a alguien / disminuir / dormirse",register:"neutro",context:"Tres usos: (1) dejar a alguien en un lugar, (2) una cantidad que disminuye, (3) quedarse dormido sin querer.",examples:[{en:"Can you <em>drop me off</em> at the airport on your way to work?",es:"\u00bfPuedes dejarme en el aeropuerto de camino al trabajo?"},{en:"Engagement <em>dropped off</em> significantly after the algorithm change.",es:"El engagement disminuy\u00f3 significativamente despu\u00e9s del cambio de algoritmo."},{en:"He <em>dropped off</em> during the long presentation \u2014 it was very late.",es:"Se qued\u00f3 dormido durante la larga presentaci\u00f3n \u2014 era muy tarde."}],tip:"'Drop off' = dejar caer = dejar en un lugar, o que algo cae gradualmente.",extra:"'Drop-off point' = punto de entrega. 'A drop-off in sales' = una ca\u00edda en las ventas."},
  {phrase:"turn down",es:"rechazar / bajar el volumen",register:"neutro",context:"Dos usos: (1) rechazar una oferta o solicitud, (2) bajar el volumen o intensidad de algo.",examples:[{en:"She <em>turned down</em> the job offer \u2014 the salary wasn't competitive.",es:"Rechaz\u00f3 la oferta de trabajo \u2014 el salario no era competitivo."},{en:"Could you <em>turn down</em> the music? I'm on a call.",es:"\u00bfPodr\u00edas bajar la m\u00fasica? Estoy en una llamada."},{en:"His proposal was <em>turned down</em> by the committee.",es:"Su propuesta fue rechazada por el comit\u00e9."}],tip:"'Turn down' = girar hacia abajo \u2192 rechazar o bajar volumen.",extra:"Para rechazar educadamente: 'I'm afraid I'll have to turn down this offer' suena m\u00e1s diplom\u00e1tico que simplemente 'I reject'."},
  {phrase:"scale up",es:"escalar / ampliar operaciones o producci\u00f3n",register:"neutro",context:"Se usa en negocios y tecnolog\u00eda para describir el crecimiento de operaciones o capacidad de forma estructurada.",examples:[{en:"We're ready to <em>scale up</em> production now that demand has stabilized.",es:"Estamos listos para escalar la producci\u00f3n ahora que la demanda se ha estabilizado."},{en:"The startup managed to <em>scale up</em> from 5 to 200 employees in two years.",es:"La startup logr\u00f3 escalar de 5 a 200 empleados en dos a\u00f1os."},{en:"The platform can <em>scale up</em> to handle millions of simultaneous users.",es:"La plataforma puede escalar para manejar millones de usuarios simult\u00e1neos."}],tip:"'Scale up' = crecer en escala = ampliar de forma proporcional y sostenida. Lo opuesto: 'scale down'.",extra:"'Scalability' = escalabilidad. 'Can it scale?' es una de las preguntas m\u00e1s importantes en tecnolog\u00eda."},
  {phrase:"reach out",es:"contactar / comunicarse / tender la mano",register:"neutro",context:"Se usa cuando alguien toma la iniciativa de contactar a otra persona. Muy com\u00fan en LinkedIn y correos profesionales.",examples:[{en:"Feel free to <em>reach out</em> if you have any questions.",es:"No dudes en contactarme si tienes alguna pregunta."},{en:"She <em>reached out</em> to former colleagues for advice on the transition.",es:"Contact\u00f3 a excompa\u00f1eros para pedir consejo sobre la transici\u00f3n."},{en:"I'll <em>reach out</em> to the client and let you know what they say.",es:"Contactar\u00e9 al cliente y te digo qu\u00e9 dicen."}],tip:"'Reach out' = extender la mano hacia alguien = tomar la iniciativa de contactar.",extra:"En algunos contextos puede sonar corporativo. 'Get in touch' o 'contact' suena m\u00e1s natural en relaciones cercanas."},
  {phrase:"step up",es:"dar un paso al frente / asumir m\u00e1s responsabilidad",register:"neutro",context:"Se usa cuando alguien asume mayor responsabilidad, especialmente en momentos cr\u00edticos. Tambi\u00e9n para describir mayor esfuerzo.",examples:[{en:"When the manager left, she <em>stepped up</em> and led the project herself.",es:"Cuando la gerente se fue, ella dio un paso al frente y lider\u00f3 el proyecto."},{en:"We need everyone to <em>step up</em> their game this quarter.",es:"Necesitamos que todos den un paso m\u00e1s este trimestre."},{en:"He really <em>stepped up</em> during the crisis \u2014 impressive leadership.",es:"Realmente se destac\u00f3 durante la crisis \u2014 liderazgo impresionante."}],tip:"'Step up' = subir un escal\u00f3n = avanzar hacia mayor responsabilidad o calidad.",extra:"'Step up to the plate' (del b\u00e9isbol) = estar a la altura de las circunstancias. Muy usada en ingl\u00e9s americano corporativo."},
  {phrase:"cut off",es:"interrumpir / desconectar / aislar",register:"neutro",context:"Se usa cuando una conexi\u00f3n, comunicaci\u00f3n o suministro se interrumpe, voluntaria o involuntariamente.",examples:[{en:"The call <em>cut off</em> in the middle of the presentation \u2014 bad signal.",es:"La llamada se cort\u00f3 en medio de la presentaci\u00f3n \u2014 mala se\u00f1al."},{en:"She <em>cut him off</em> mid-sentence \u2014 she was in a hurry.",es:"Lo interrumpi\u00f3 a mitad de la oraci\u00f3n \u2014 ten\u00eda prisa."},{en:"The town was <em>cut off</em> from the mainland after the storm.",es:"El pueblo qued\u00f3 aislado del continente despu\u00e9s de la tormenta."}],tip:"'Cut off' = cortar el flujo \u2192 interrumpir una comunicaci\u00f3n, suministro o conexi\u00f3n.",extra:"'Feel cut off' = sentirse aislado. 'Cut off someone in traffic' = cerrarle el paso a alguien en la carretera."},
  {phrase:"draw on",es:"aprovechar / basarse en / recurrir a",register:"formal",context:"Se usa cuando alguien aprovecha sus experiencias, conocimientos o recursos previos. M\u00e1s formal que 'use'.",examples:[{en:"In her speech, she <em>drew on</em> 20 years of experience in the field.",es:"En su discurso, se bas\u00f3 en 20 a\u00f1os de experiencia en el campo."},{en:"We'll need to <em>draw on</em> all available resources to meet this deadline.",es:"Necesitaremos aprovechar todos los recursos disponibles para cumplir este plazo."},{en:"The novel <em>draws on</em> real historical events from the 1940s.",es:"La novela se basa en eventos hist\u00f3ricos reales de los a\u00f1os 40."}],tip:"'Draw on' = sacar de una fuente = aprovechar algo que ya tienes. M\u00e1s elegante que 'use'.",extra:"Muy com\u00fan en textos acad\u00e9micos: 'Drawing on our research, we can conclude that...'"},
  {phrase:"iron out",es:"resolver / aclarar / allanar dificultades",register:"neutro",context:"Se usa para describir el proceso de resolver peque\u00f1os problemas o detalles que quedan pendientes antes de que algo est\u00e9 listo.",examples:[{en:"We still need to <em>iron out</em> a few details before signing the contract.",es:"Todav\u00eda necesitamos resolver algunos detalles antes de firmar el contrato."},{en:"Let's <em>iron out</em> any miscommunications before the client calls.",es:"Resolvamos cualquier malentendido antes de la llamada con el cliente."},{en:"There are a few wrinkles to <em>iron out</em>, but we're almost there.",es:"Hay algunos detalles que resolver, pero ya casi llegamos."}],tip:"'Iron out' = planchar las arrugas = eliminar los problemas que 'arrugan' un plan.",extra:"Se usa para problemas peque\u00f1os o detalles finales. 'Iron out the kinks' es otra variante muy com\u00fan."},
  {phrase:"map out",es:"trazar / planificar / delinear en detalle",register:"neutro",context:"Se usa cuando alguien planifica algo de forma detallada y sistem\u00e1tica, como una estrategia o un proyecto.",examples:[{en:"Before the project starts, let's <em>map out</em> the key milestones.",es:"Antes de que empiece el proyecto, tracemos los hitos clave."},{en:"She <em>mapped out</em> her career plan for the next five years.",es:"Ella traz\u00f3 su plan de carrera para los pr\u00f3ximos cinco a\u00f1os."},{en:"The team spent the afternoon <em>mapping out</em> the new process.",es:"El equipo pas\u00f3 la tarde delineando el nuevo proceso."}],tip:"'Map out' = crear un mapa detallado = planificar paso a paso. Implica sistematismo y visi\u00f3n clara.",extra:"'Roadmap' es el sustantivo relacionado en tecnolog\u00eda: 'a product roadmap' = un mapa de ruta del producto."},
  {phrase:"count on",es:"contar con / depender de / confiar en",register:"neutro",context:"Se usa para expresar que alguien puede depender de otra persona o cosa. Muy frecuente en trabajo en equipo.",examples:[{en:"You can always <em>count on</em> her \u2014 she never misses a deadline.",es:"Siempre puedes contar con ella \u2014 nunca falla un plazo."},{en:"Can I <em>count on</em> your support during the board presentation?",es:"\u00bfPuedo contar con tu apoyo durante la presentaci\u00f3n del directorio?"},{en:"Don't <em>count on</em> the weather \u2014 have a backup plan.",es:"No cuentes con el clima \u2014 ten un plan alternativo."}],tip:"'Count on' = contar hacia adelante = confiar en que algo estar\u00e1 disponible. Sin\u00f3nimos: 'rely on', 'depend on'.",extra:"'I'm counting on you' es expresi\u00f3n de confianza pero tambi\u00e9n de presi\u00f3n. El tono determina cu\u00e1l de las dos es."},
  {phrase:"push back",es:"resistir / rechazar / posponer",register:"neutro",context:"Se usa cuando alguien cuestiona, resiste o pide un cambio ante una decisi\u00f3n. Tambi\u00e9n significa posponer una fecha.",examples:[{en:"She <em>pushed back</em> on the timeline \u2014 she said two weeks wasn't enough.",es:"Cuestion\u00f3 el cronograma \u2014 dijo que dos semanas no eran suficientes."},{en:"The launch date was <em>pushed back</em> to allow more testing time.",es:"La fecha de lanzamiento fue pospuesta para dar m\u00e1s tiempo a las pruebas."},{en:"Don't be afraid to <em>push back</em> if the brief doesn't make sense.",es:"No tengas miedo de cuestionar si el brief no tiene sentido."}],tip:"'Push back' = empujar hacia atr\u00e1s = resistir o retrasar. Muy usado en negociaciones y gesti\u00f3n de proyectos.",extra:"'Pushback' (sustantivo) = resistencia a una idea. 'We got a lot of pushback on that proposal.' Muy com\u00fan en reuniones ejecutivas."},
  {phrase:"own up",es:"admitir / reconocer un error",register:"informal",context:"Se usa cuando alguien confiesa abiertamente que cometi\u00f3 un error. Implica honestidad y valent\u00eda.",examples:[{en:"Someone broke the printer \u2014 whoever it was, please <em>own up</em>.",es:"Alguien rompi\u00f3 la impresora \u2014 quien haya sido, por favor que lo admita."},{en:"He finally <em>owned up</em> to making the wrong call on the investment.",es:"Finalmente admiti\u00f3 haber tomado la decisi\u00f3n incorrecta en la inversi\u00f3n."},{en:"It's better to <em>own up</em> early than to wait until things get worse.",es:"Es mejor admitirlo pronto que esperar a que las cosas empeoren."}],tip:"'Own up' = apropiarse de algo = asumir la propiedad de un error. M\u00e1s informal que 'admit' o 'confess'.",extra:"La cultura anglosajona valora mucho el 'owning your mistakes' como se\u00f1al de madurez profesional."},
  {phrase:"bounce back",es:"recuperarse / rebotar / resurgir",register:"neutro",context:"Se usa para describir la recuperaci\u00f3n despu\u00e9s de un fracaso o per\u00edodo dif\u00edcil. Transmite resiliencia.",examples:[{en:"The market <em>bounced back</em> quickly after the initial shock.",es:"El mercado se recuper\u00f3 r\u00e1pidamente despu\u00e9s del shock inicial."},{en:"She <em>bounced back</em> from the rejection and launched her own startup.",es:"Se recuper\u00f3 del rechazo y lanz\u00f3 su propia startup."},{en:"It takes resilience to <em>bounce back</em> from a failed product launch.",es:"Se necesita resiliencia para recuperarse de un lanzamiento de producto fallido."}],tip:"'Bounce back' = rebotar como una pelota = volver al nivel anterior despu\u00e9s de caer.",extra:"'Bounce-back rate' = tasa de rebote (email marketing). En psicolog\u00eda: capacidad de resiliencia."},
  {phrase:"zero in on",es:"centrarse en / enfocarse / identificar con precisi\u00f3n",register:"neutro",context:"Se usa cuando alguien dirige toda su atenci\u00f3n hacia un objetivo espec\u00edfico. Met\u00e1fora de apuntar con precisi\u00f3n.",examples:[{en:"The team <em>zeroed in on</em> the root cause of the bug in less than an hour.",es:"El equipo identific\u00f3 la causa ra\u00edz del bug en menos de una hora."},{en:"Let's <em>zero in on</em> the three markets with the highest growth potential.",es:"Enfoqu\u00e9monos en los tres mercados con mayor potencial de crecimiento."},{en:"She quickly <em>zeroed in on</em> the key issue during the audit.",es:"R\u00e1pidamente identific\u00f3 el problema clave durante la auditor\u00eda."}],tip:"'Zero in on' = apuntar al cero = enfocar con m\u00e1xima precisi\u00f3n en un objetivo.",extra:"Originado en terminolog\u00eda militar. Hoy es com\u00fan en negocios e investigaci\u00f3n para indicar foco extremo."},
  {phrase:"kick off",es:"lanzar / iniciar / comenzar",register:"neutro",context:"Se usa para marcar el inicio de un proyecto, evento o reuni\u00f3n. M\u00e1s energ\u00e9tico que simplemente 'start'.",examples:[{en:"We're planning to <em>kick off</em> the new campaign on the first of the month.",es:"Planeamos lanzar la nueva campa\u00f1a el primero de mes."},{en:"The annual conference <em>kicks off</em> tomorrow at 9 AM.",es:"La conferencia anual comienza ma\u00f1ana a las 9 AM."},{en:"Let's <em>kick off</em> with a quick round of introductions.",es:"Comencemos con una ronda r\u00e1pida de presentaciones."}],tip:"'Kick off' = dar el puntapi\u00e9 inicial (del f\u00fatbol). Sustantivo: 'kickoff meeting' = reuni\u00f3n de inicio de proyecto.",extra:"'Kickoff meeting' o 'kick-off call' son t\u00e9rminos est\u00e1ndar en gesti\u00f3n de proyectos para la reuni\u00f3n inaugural."},
  {phrase:"roll out",es:"lanzar / implementar / desplegar gradualmente",register:"neutro",context:"Se usa para describir el lanzamiento o implementaci\u00f3n gradual y planificada de un producto, sistema o pol\u00edtica.",examples:[{en:"We're planning to <em>roll out</em> the new feature to all users by Q3.",es:"Planeamos implementar la nueva funci\u00f3n para todos los usuarios en el tercer trimestre."},{en:"The vaccination campaign was <em>rolled out</em> across the country in phases.",es:"La campa\u00f1a de vacunaci\u00f3n fue implementada en todo el pa\u00eds por fases."},{en:"How long will it take to <em>roll out</em> the updated privacy policy?",es:"\u00bfCu\u00e1nto tiempo llevar\u00e1 implementar la pol\u00edtica de privacidad actualizada?"}],tip:"'Roll out' = desplegar como un rollo = implementar de forma progresiva y organizada.",extra:"'Rollout' (sustantivo) = implementaci\u00f3n o lanzamiento gradual. 'A phased rollout' = implementaci\u00f3n por fases."},
  {phrase:"ramp up",es:"aumentar / intensificar / escalar progresivamente",register:"neutro",context:"Se usa para describir un aumento gradual pero deliberado en velocidad, producci\u00f3n, esfuerzo o escala.",examples:[{en:"We need to <em>ramp up</em> production to meet the holiday season demand.",es:"Necesitamos aumentar la producci\u00f3n para satisfacer la demanda de la temporada navide\u00f1a."},{en:"The team <em>ramped up</em> their efforts in the final two weeks before launch.",es:"El equipo intensific\u00f3 sus esfuerzos en las \u00faltimas dos semanas antes del lanzamiento."},{en:"Marketing spend will <em>ramp up</em> significantly in Q4.",es:"El gasto en marketing aumentar\u00e1 significativamente en el cuarto trimestre."}],tip:"'Ramp up' = subir por una rampa = aumentar de forma gradual y sostenida. Lo opuesto: 'ramp down'.",extra:"'Ramp-up period' = per\u00edodo de adaptaci\u00f3n e incremento inicial. Muy usado en onboarding de empleados."},
  {phrase:"sign off on",es:"aprobar / dar el visto bueno a",register:"formal",context:"Se usa cuando alguien da aprobaci\u00f3n formal a un documento, decisi\u00f3n o proyecto. Muy com\u00fan en procesos de revisi\u00f3n corporativos.",examples:[{en:"The CEO needs to <em>sign off on</em> any expenditure over $10,000.",es:"El CEO necesita aprobar cualquier gasto superior a $10,000."},{en:"Has the legal team <em>signed off on</em> the new contract template?",es:"\u00bfEl equipo legal ha dado el visto bueno a la nueva plantilla de contrato?"},{en:"I'm waiting for the client to <em>sign off on</em> the final design.",es:"Estoy esperando que el cliente apruebe el dise\u00f1o final."}],tip:"'Sign off on' = firmar para cerrar = dar aprobaci\u00f3n formal. Implica responsabilidad expl\u00edcita.",extra:"'Sign off' solo (sin 'on') = terminar una comunicaci\u00f3n: 'I'll sign off here' al final de un correo. Dos usos distintos."},
  {phrase:"weigh up",es:"sopesar / evaluar / comparar opciones",register:"neutro",context:"Se usa cuando alguien eval\u00faa cuidadosamente los pros y contras antes de tomar una decisi\u00f3n.",examples:[{en:"I'm <em>weighing up</em> whether to accept the job offer or stay.",es:"Estoy sopesando si aceptar la oferta de trabajo o quedarme."},{en:"The committee spent a week <em>weighing up</em> all the proposals.",es:"El comit\u00e9 pas\u00f3 una semana evaluando todas las propuestas."},{en:"Before committing, we need to <em>weigh up</em> the risks carefully.",es:"Antes de comprometernos, necesitamos sopesar los riesgos con cuidado."}],tip:"'Weigh up' = poner en la balanza = comparar el peso de distintas opciones.",extra:"En ingl\u00e9s americano se dice simplemente 'weigh' (sin 'up'). En ingl\u00e9s brit\u00e1nico, 'weigh up' es m\u00e1s natural."},
  {phrase:"bring in",es:"incorporar / contratar / generar ingresos",register:"neutro",context:"Tres usos: (1) contratar a alguien externo, (2) generar ingresos, (3) incorporar una nueva pr\u00e1ctica.",examples:[{en:"We're going to <em>bring in</em> an external consultant to review the process.",es:"Vamos a incorporar a un consultor externo para revisar el proceso."},{en:"The new product line is already <em>bringing in</em> significant revenue.",es:"La nueva l\u00ednea de productos ya est\u00e1 generando ingresos significativos."},{en:"They <em>brought in</em> agile methodology to improve delivery speed.",es:"Incorporaron la metodolog\u00eda \u00e1gil para mejorar la velocidad de entrega."}],tip:"'Bring in' = traer hacia adentro = incorporar desde afuera.",extra:"'Bring in a new perspective' = aportar una perspectiva nueva. Muy usado en innovaci\u00f3n y gesti\u00f3n del cambio."},
  {phrase:"hand over",es:"entregar / ceder / traspasar",register:"neutro",context:"Se usa cuando algo (control, responsabilidad, objeto) se transfiere formalmente de una persona a otra.",examples:[{en:"She <em>handed over</em> all her accounts to her successor before leaving.",es:"Le entreg\u00f3 todas sus cuentas a su sucesor antes de irse."},{en:"Please <em>hand over</em> your badge and access card when you exit.",es:"Por favor entrega tu credencial y tarjeta de acceso al salir."},{en:"The outgoing president <em>handed over</em> power in a formal ceremony.",es:"El presidente saliente cedi\u00f3 el poder en una ceremonia formal."}],tip:"'Hand over' = poner en la mano de otro = transferir responsabilidad o control. M\u00e1s formal que simplemente 'give'.",extra:"'Handover' (sustantivo) = traspaso formal. 'A smooth handover' = una transici\u00f3n sin problemas."},
  {phrase:"flesh out",es:"desarrollar / ampliar / darle cuerpo a una idea",register:"neutro",context:"Se usa cuando una idea b\u00e1sica se desarrolla con m\u00e1s detalles. Implica pasar de lo superficial a lo completo.",examples:[{en:"The proposal looks promising \u2014 let's <em>flesh it out</em> before the meeting.",es:"La propuesta parece prometedora \u2014 desarroll\u00e9mosla antes de la reuni\u00f3n."},{en:"Could you <em>flesh out</em> your initial concept with some concrete examples?",es:"\u00bfPodr\u00edas ampliar tu concepto inicial con algunos ejemplos concretos?"},{en:"We have the structure \u2014 now we need to <em>flesh out</em> each section.",es:"Tenemos la estructura \u2014 ahora necesitamos darle cuerpo a cada secci\u00f3n."}],tip:"'Flesh out' = poner carne al esqueleto = a\u00f1adir sustancia y detalle a algo b\u00e1sico.",extra:"Se usa en fases de desarrollo de proyectos y dise\u00f1o de productos. 'This needs more fleshing out' = esto necesita m\u00e1s desarrollo."},
  {phrase:"back down",es:"echarse atr\u00e1s / ceder / retractarse",register:"neutro",context:"Se usa cuando alguien cede en una posici\u00f3n que manten\u00eda, ante presi\u00f3n o evidencia contraria.",examples:[{en:"He refused to <em>back down</em> \u2014 he was convinced he was right.",es:"Se neg\u00f3 a echarse atr\u00e1s \u2014 estaba convencido de que ten\u00eda raz\u00f3n."},{en:"She <em>backed down</em> from her initial demand after seeing the data.",es:"Cedi\u00f3 en su demanda inicial despu\u00e9s de ver los datos."},{en:"The company <em>backed down</em> from the controversial pricing decision.",es:"La empresa se retract\u00f3 de la controvertida decisi\u00f3n de precios."}],tip:"'Back down' = retroceder desde una posici\u00f3n = ceder. Lo opuesto: 'stand firm' o 'hold your ground'.",extra:"Diferente de 'back off' (alejarse) y 'back out' (retirarse de un acuerdo). 'Back down' es sobre cambiar de posici\u00f3n en una disputa."},
  {phrase:"hammer out",es:"acordar tras negociaci\u00f3n / resolver a fuerza de trabajo",register:"neutro",context:"Se usa cuando un acuerdo o soluci\u00f3n se logra despu\u00e9s de mucha negociaci\u00f3n. Implica proceso duro pero exitoso.",examples:[{en:"The two teams finally <em>hammered out</em> an agreement after six hours.",es:"Los dos equipos finalmente llegaron a un acuerdo despu\u00e9s de seis horas."},{en:"We need to <em>hammer out</em> the contract details before Monday.",es:"Necesitamos resolver los detalles del contrato antes del lunes."},{en:"The policy was <em>hammered out</em> through months of consultation.",es:"La pol\u00edtica fue acordada a trav\u00e9s de meses de consulta."}],tip:"'Hammer out' = golpear hasta dar forma = lograr algo a trav\u00e9s de esfuerzo y negociaci\u00f3n persistente.",extra:"La met\u00e1fora es del trabajo del herrero. Implica que el proceso fue dif\u00edcil pero el resultado es s\u00f3lido."},
  {phrase:"stem from",es:"provenir de / originarse en / tener su ra\u00edz en",register:"formal",context:"Se usa para indicar el origen o causa de algo. Muy com\u00fan en an\u00e1lisis de problemas y documentos formales.",examples:[{en:"The communication issues <em>stem from</em> unclear role definitions.",es:"Los problemas de comunicaci\u00f3n provienen de definiciones de roles poco claras."},{en:"Her confidence <em>stems from</em> years of preparation and hard work.",es:"Su confianza proviene de a\u00f1os de preparaci\u00f3n y trabajo duro."},{en:"Many startup failures <em>stem from</em> a lack of product-market fit.",es:"Muchos fracasos de startups se originan en la falta de product-market fit."}],tip:"'Stem from' = crecer desde el tronco = tener su origen en algo. M\u00e1s formal y elegante que 'come from'.",extra:"Muy usado en an\u00e1lisis de causa ra\u00edz: 'The problem stems from...' es una apertura formal y directa para diagn\u00f3sticos."},
